<script>
  // ==== Inicialização Firebase ====
  const firebaseConfig = {
    apiKey: "SEU_API_KEY",
    authDomain: "SEU_AUTH_DOMAIN",
    databaseURL: "SUA_DATABASE_URL",
    projectId: "SEU_PROJECT_ID",
    storageBucket: "SEU_STORAGE_BUCKET",
    messagingSenderId: "SEU_MESSAGING_SENDER_ID",
    appId: "SEU_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const syncDot = document.getElementById('sync-dot');
  const syncLabel = document.getElementById('sync-label');

  // ==== Listener para atualizações em tempo real ====
  db.ref('/demandas').on('value', (snapshot) => {
    const data = snapshot.val();
    if(!data) return;
    
    // Atualiza CC
    const ccTags = document.getElementById('cc-tags');
    ccTags.innerHTML = '';
    data.cc?.forEach(pais=>{
      const span = document.createElement('span');
      span.className = 'tag tag-cc';
      span.textContent = pais;
      ccTags.appendChild(span);
    });

    // Atualiza EMP
    const empTags = document.getElementById('emp-tags');
    empTags.innerHTML = '';
    data.emp?.forEach(pais=>{
      const span = document.createElement('span');
      span.className = 'tag tag-emp';
      span.textContent = pais;
      empTags.appendChild(span);
    });

    syncDot.className = 'sync-dot ok';
    syncLabel.textContent = 'Conectado ao Firebase';
  }, (err)=>{
    syncDot.className = 'sync-dot danger';
    syncLabel.textContent = 'Erro ao conectar: '+err;
  });

  // ==== Botão aplicar demandas ====
  document.getElementById('btn-apply-dem').addEventListener('click', ()=>{
    const ccVal = document.getElementById('inp-cc').value.split('-').map(s=>s.trim()).filter(Boolean);
    const empVal = document.getElementById('inp-emp').value.split('-').map(s=>s.trim()).filter(Boolean);
    db.ref('/demandas').set({cc: ccVal, emp: empVal}).then(()=>{
      document.getElementById('notice-dem').style.display = 'block';
      setTimeout(()=>document.getElementById('notice-dem').style.display='none', 2500);
    });
  });
</script>
