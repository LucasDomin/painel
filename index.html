<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas — Crédito & Empréstimo</title>
<style>
body { font-family:Arial, sans-serif; background:#efefec; padding:20px; color:#1a1a18; }
.container { max-width:800px; margin:auto; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.title { font-size:20px; font-weight:bold; }
.day-badge { font-size:13px; padding:6px 12px; border-radius:8px; background:#e6f1fb; color:#0c447c; }
.cards-row { display:flex; gap:10px; margin-bottom:10px; }
.card { background:#fff; border:1px solid #ccc; border-radius:12px; padding:12px; flex:1; }
.card-title { font-size:12px; font-weight:bold; margin-bottom:8px; }
.tag-wrap { display:flex; flex-wrap:wrap; gap:6px; }
.tag { font-size:12px; padding:4px 8px; border-radius:6px; cursor:pointer; position:relative; background:#e6f1fb; color:#0c447c; }
.tag-emp { background:#eaf3de; color:#27500a; }
.tag:hover .tooltip { display:block; }
.tooltip { display:none; position:absolute; top:110%; left:50%; transform:translateX(-50%); background:#333; color:#fff; font-size:11px; padding:4px 6px; border-radius:4px; white-space:nowrap; z-index:10; }
.escala-week { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:6px; }
.escala-day { padding:6px; text-align:center; border-radius:6px; background:#f5f5f3; cursor:pointer; }
.escala-day.today { background:#eaf3de; font-weight:bold; border:1px solid #27500a; }
.person-block { background:#fff; padding:8px; margin-bottom:6px; border-radius:8px; border:1px solid #ccc; }
.person-name { font-weight:bold; margin-bottom:4px; }
.person-tags { display:flex; flex-wrap:wrap; gap:4px; }
.person-tags .tag.done { border:1px solid #28a745; background:#d4edda; }
.update-area { background:#f5f5f3; padding:10px; border-radius:12px; margin-bottom:10px; border:1px solid #ccc; }
textarea { width:100%; padding:6px; font-size:13px; border-radius:6px; border:1px solid #ccc; margin-bottom:6px; }
button { padding:6px 12px; border-radius:6px; border:1px solid #aaa; background:#fff; cursor:pointer; margin-top:4px; }
button.primary { background:#e6f1fb; color:#0c447c; border-color:#0c447c; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="title">Painel de Campanhas</span>
    <span class="day-badge" id="day-badge">—</span>
  </div>

  <!-- CARTÕES DISPONÍVEIS HOJE LADO A LADO -->
  <div class="cards-row">
    <div class="card">
      <div class="card-title">Cartão de crédito — disponíveis hoje <span id="cc-total"></span></div>
      <div class="tag-wrap" id="cc-tags"></div>
    </div>
    <div class="card">
      <div class="card-title">Empréstimo — disponíveis hoje <span id="emp-total"></span></div>
      <div class="tag-wrap" id="emp-tags"></div>
    </div>
  </div>

  <!-- ESCALA SEMANAL -->
  <div class="card">
    <div class="card-title">Escala semanal</div>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <!-- BLOCO PESSOAS -->
  <div id="people-block"></div>

  <!-- ATUALIZAR DEMANDAS -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div>CC — lista de países</div>
    <textarea id="inp-cc"></textarea>
    <div>EMP — lista de países</div>
    <textarea id="inp-emp"></textarea>
    <button class="primary" id="btn-apply-dem">Aplicar demandas</button>
  </div>
</div>

<script>
// DOMÍNIOS
const DOMAINS = {
  BR:['vouquitar','cardfacil'], DE:['dekreditkarte','unum.de'], JP:['justgreatcards'], TH:['batkredit'], FR:['unum.fr'],
  AR:['tarjetasargentinas','solicitecartao'], US:['gotallcards'], MX:['mejoresopciones','unum.mx'],
  AU:['unum.au'], PH:['unum.ph'], BE:['antivora'], NL:['dekredit'], CO:['tarjetaahora'], PE:['unum.pe'],
  GR:['athivor'], ID:['unum.id'], EG:['unum.eg'], TR:['kredinow'], VN:['ttdtm'], AE:['moneycredithub']
};

const AVAIL = {
  BR:['seg','ter','qua','qui','sex'], DE:['seg','ter','qua','qui','sex'], JP:['seg','ter','qua','qui','sex'], TH:['seg','ter','qui'], FR:['seg','ter','qua','qui','sex'],
  AR:['seg','qua','qui','sex'], US:['seg','ter','qua','qui','sex'], MX:['seg','qua','sex'], AU:['seg','ter','qui'], PH:['seg','qui','sex'], BE:['seg','ter','qua','qui','sex'],
  NL:['seg','qua','sex'], CO:['seg','qua','qui','sex'], PE:['seg','ter','qua','qui'], GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'], TR:['seg','qua','sex'], VN:['seg','qua','sex'], AE:['seg','ter','qua','qui','sex']
};

const DAY_MAP={0:null,1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:null};
const DAY_NAMES={1:'Segunda-feira',2:'Terça-feira',3:'Quarta-feira',4:'Quinta-feira',5:'Sexta-feira'};

// DEMANDAS
let state={ cc:'BR DE JP TH FR AR US MX AU PH BE NL CO PE GR ID EG TR VN AE', emp:'MX AR US AU VN PH CL CO AE PE BE', escala:{1:'LUIZA',2:'LUCAS',3:'LÉO',4:'RYAN',5:'PEDRO'}, done:{cc:{},emp:{}} };

function parseList(str){ return str.toUpperCase().split(/[\s,-]+/).filter(Boolean); }
function getToday(){ const d=new Date().getDay(); return {dow:d, key:DAY_MAP[d]}; }

function renderTags(ids,cls,containerId,totalId){
  const today=getToday(); 
  let display=ids.filter(c=>AVAIL[c]?.includes(today.key));
  if(cls==='tag-cc'){
    const empToday=parseList(state.emp).filter(c=>AVAIL[c]?.includes(today.key));
    display=display.filter(c=>!empToday.includes(c));
  }
  document.getElementById(totalId).textContent=display.length;
  const cont=document.getElementById(containerId);
  cont.innerHTML=display.map(c=>`<span class="tag ${cls}" data-country="${c}">${c}<span class="tooltip">${DOMAINS[c]?.join('/')||''}</span></span>`).join(' ');
}

function renderEscala(){
  const el=document.getElementById('escala-week'); el.innerHTML='';
  [1,2,3,4,5].forEach(d=>{
    const div=document.createElement('div'); div.className='escala-day'+(d===getToday().dow?' today':'');
    div.innerHTML=`${DAY_NAMES[d]}<br>${state.escala[d]||'—'}`;
    div.onclick=()=>renderForDay(d);
    el.appendChild(div);
  });
}

function renderPeople(){
  const block=document.getElementById('people-block'); block.innerHTML='';
  const today=getToday().dow; const key=getToday().key;
  const resp=state.escala[today];
  const ccNames=['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO'];
  const empNames=['WALDIR','VICTOR']; if(resp && !empNames.includes(resp)) empNames.push(resp);
  const ccList=parseList(state.cc).filter(c=>AVAIL[c]?.includes(key));
  const empList=parseList(state.emp).filter(c=>AVAIL[c]?.includes(key));
  ccNames.forEach(n=>{
    const div=document.createElement('div'); div.className='person-block'; if(n===resp) div.style.border='2px solid #0c447c';
    const title=document.createElement('div'); title.className='person-name'; title.textContent=n; 
    const tags=document.createElement('div'); tags.className='person-tags';
    ccList.forEach(c=>{ 
      const t=document.createElement('span'); t.className='tag tag-cc'; t.textContent=c;
      t.onclick=()=>{ t.classList.toggle('done'); state.done.cc[c]=t.classList.contains('done'); };
      const tt=document.createElement('span'); tt.className='tooltip'; tt.textContent=DOMAINS[c]?.join('/'); t.appendChild(tt);
      tags.appendChild(t);
    });
    div.appendChild(title); div.appendChild(tags); block.appendChild(div);
  });
  empNames.forEach(n=>{
    if(n===resp) return;
    const div=document.createElement('div'); div.className='person-block';
    const title=document.createElement('div'); title.className='person-name'; title.textContent=n; 
    const tags=document.createElement('div'); tags.className='person-tags';
    empList.forEach(c=>{
      const t=document.createElement('span'); t.className='tag tag-emp'; t.textContent=c;
      t.onclick=()=>{ t.classList.toggle('done'); state.done.emp[c]=t.classList.contains('done'); };
      const tt=document.createElement('span'); tt.className='tooltip'; tt.textContent=DOMAINS[c]?.join('/'); t.appendChild(tt);
      tags.appendChild(t);
    });
    div.appendChild(title); div.appendChild(tags); block.appendChild(div);
  });
}

function renderForDay(dow){
  document.getElementById('day-badge').textContent=DAY_NAMES[dow];
  renderTags(parseList(state.cc),'tag-cc','cc-tags','cc-total');
  renderTags(parseList(state.emp),'tag-emp','emp-tags','emp-total');
  renderPeople();
}

document.getElementById('btn-apply-dem').onclick=()=>{ 
  const c=document.getElementById('inp-cc').value; if(c) state.cc=c; 
  const e=document.getElementById('inp-emp').value; if(e) state.emp=e; 
  renderForDay(getToday().dow); 
};

renderEscala();
renderForDay(getToday().dow);
</script>
</body>
</html>
