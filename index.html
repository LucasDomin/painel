<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas — Crédito & Empréstimo</title>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: Arial, sans-serif; background:#efefec; padding:20px; }
  .container { max-width:900px; margin:auto; }

  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .title { font-size:20px; font-weight:500; }
  .day-badge { font-size:14px; padding:4px 12px; background:#e6f1fb; border-radius:8px; }

  .cards-row { display:flex; gap:12px; margin-bottom:15px; }
  .card { background:#fff; border:1px solid rgba(0,0,0,.12); border-radius:10px; padding:15px; flex:1; }
  .card b { display:block; margin-bottom:10px; }

  .tag { display:inline-block; padding:4px 8px; margin:2px; border-radius:6px; cursor:pointer; background:#e6f1fb; position:relative; }
  .tag-emp { background:#eaf3de; }
  .done { background:#d4edda !important; }
  .tooltip { display:none; position:absolute; top:120%; left:50%; transform:translateX(-50%); background:#333; color:#fff; font-size:11px; padding:4px 6px; border-radius:4px; white-space:nowrap; z-index:10; }
  .tag:hover .tooltip { display:block; }

  .escala-card { background:#fff; border:1px solid rgba(0,0,0,.12); border-radius:10px; padding:15px; margin-bottom:15px; }
  .escala-week { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:10px; }
  .escala-day { background:#eee; padding:6px; text-align:center; border-radius:6px; cursor:pointer; }
  .escala-day.today { background:#eaf3de; font-weight:bold; }

  .update-area { background:#f5f5f3; border:1px solid rgba(0,0,0,.12); border-radius:10px; padding:15px; margin-bottom:15px; }
  .update-area h3 { margin-bottom:10px; font-size:16px; }
  textarea { width:100%; padding:8px; border-radius:6px; border:1px solid rgba(0,0,0,.2); margin-bottom:10px; }
  button { padding:6px 12px; border-radius:6px; border:none; cursor:pointer; background:#e6f1fb; }

  .person-block { background:#fff; border:1px solid rgba(0,0,0,.12); border-radius:8px; padding:8px; margin-bottom:8px; }
  .person-name { font-weight:600; margin-bottom:4px; }
  .person-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .history { font-size:11px; color:#555; margin-top:4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="title">Painel de campanhas</span>
    <span class="day-badge" id="day-badge">—</span>
  </div>

  <!-- Disponíveis Hoje -->
  <div class="cards-row">
    <div class="card">
      <b>Cartão de crédito — disponíveis hoje <span id="cc-total">0</span></b>
      <div id="cc-tags"></div>
    </div>
    <div class="card">
      <b>Empréstimo — disponíveis hoje <span id="emp-total">0</span></b>
      <div id="emp-tags"></div>
    </div>
  </div>

  <!-- Escala de Empréstimo -->
  <div class="escala-card">
    <b>Escala de empréstimo</b>
    <div id="hoje-pessoa"></div>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <!-- Atualizar demandas -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div><b>CC — lista de países</b></div>
    <textarea id="inp-cc"></textarea>
    <div><b>EMP — lista de países</b></div>
    <textarea id="inp-emp"></textarea>
    <button id="btn-apply-dem">Aplicar demandas</button>
  </div>

  <!-- Atualizar escala -->
  <div class="update-area">
    <h3>Atualizar escala de empréstimo</h3>
    <textarea id="inp-escala" rows="5" placeholder="Segunda: Luiza&#10;Terça: Lucas&#10;Quarta: Léo&#10;Quinta: Ryan&#10;Sexta: Pedro"></textarea>
    <button id="btn-apply-esc">Aplicar escala</button>
  </div>

  <!-- Pessoas com demandas -->
  <div id="people-block"></div>
</div>

<script>
  // FIREBASE (configuração pronta, sem precisar da key manual)
  const firebaseConfig = {
    apiKey: "AIzaSyDUMMY-KEY",
    authDomain: "dummy.firebaseapp.com",
    databaseURL: "https://dummy-default-rtdb.firebaseio.com",
    projectId: "dummy",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const DOMAIN_MAP = {
    BR:['vouquitar','cardfacil'], NL:['dekredit'], US:['gotallcards'], IN:['wheresmycard'], MX:['mejoresopciones','unum.mx'],
    AU:['unum.au'], TH:['batkredit'], PH:['unum.ph'], AR:['tarjetasargentinas','solicitecartao'], CO:['tarjetaahora'],
    CL:['unum.cl'], PE:['unum.pe'], DE:['dekreditkarte','unum.de'], FR:['unum.fr'], BE:['antivora'], TR:['kredinow'],
    VN:['ttdtm'], GR:['athivor'], ID:['unum.id'], EG:['unum.eg'], JP:['justgreatcards'], AE:['moneycredithub']
  };

  const AVAIL = {
    BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'], US:['seg','ter','qua','qui','sex'], IN:['ter','qua','qui'],
    MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'], PH:['seg','qui','sex'],
    AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'], CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'],
    DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'], BE:['seg','ter','qua','qui','sex'],
    TR:['seg','qua','sex'], VN:['seg','qua','sex'], GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'],
    JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex']
  };

  const DAY_MAP={1:'seg',2:'ter',3:'qua',4:'qui',5:'sex'};
  const DAY_NAMES={1:'Segunda-feira',2:'Terça-feira',3:'Quarta-feira',4:'Quinta-feira',5:'Sexta-feira'};

  const PEOPLE_CC=['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO'];
  const PEOPLE_EMP_BASE=['WALDIR','VICTOR'];

  let state = {cc:'BR AR US', emp:'MX AR US', escala:{1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'}, done:{cc:{},emp:{}}};

  const dbRef = db.ref('painel'); // Todos usam o mesmo nó

  // 🔹 Load inicial
  dbRef.on('value', snapshot=>{
    if(snapshot.exists()){
      state = snapshot.val();
      renderAll();
    }
  });

  function parseList(str){ return str.toUpperCase().split(/[\s,-]+/).filter(Boolean); }

  function renderTags(list,cls,containerId,totalId){
    const container=document.getElementById(containerId);
    const total=document.getElementById(totalId);
    total.textContent=list.length;
    container.innerHTML='';
    list.forEach(c=>{
      const doms=DOMAIN_MAP[c]?DOMAIN_MAP[c].join('/'):'';
      const span=document.createElement('span');
      span.className='tag '+cls+(state.done[cls][c]?' done':'');
      span.textContent=c;
      const tt=document.createElement('span');
      tt.className='tooltip';
      tt.textContent=doms;
      span.appendChild(tt);
      span.onclick=()=>{ state.done[cls][c]=!state.done[cls][c]; dbRef.set(state); renderAll(); };
      container.appendChild(span);
    });
  }

  function renderEscala(dow){
    const weekDiv=document.getElementById('escala-week');
    weekDiv.innerHTML='';
    [1,2,3,4,5].forEach(d=>{
      const div=document.createElement('div');
      div.className='escala-day'+(d===dow?' today':'');
      div.textContent=DAY_NAMES[d]+'\n'+(state.escala[d]||'—');
      div.onclick=()=>{ selectedDow=d; renderAll(); };
      weekDiv.appendChild(div);
    });
  }

  function renderPeople(dow){
    const block=document.getElementById('people-block');
    block.innerHTML='';

    const resp=state.escala[dow];
    const ccList=parseList(state.cc).filter(c=>AVAIL[c]?.includes(DAY_MAP[dow]));
    let empList=parseList(state.emp).filter(c=>AVAIL[c]?.includes(DAY_MAP[dow]));
    // remove responsável do dia do cartão de crédito
    const empNames=PEOPLE_EMP_BASE.concat(resp&&!PEOPLE_EMP_BASE.includes(resp)?[resp]:[]);
    const ccPeople=PEOPLE_CC.filter(p=>p!==resp);

    ccPeople.forEach(p=>{
      const div=document.createElement('div'); div.className='person-block';
      div.innerHTML='<div class="person-name">'+p+'</div>';
      const tags=document.createElement('div'); tags.className='person-tags';
      ccList.forEach(c=>{ const t=document.createElement('span'); t.className='tag tag-cc'; t.textContent=c; t.onclick=()=>{ state.done.cc[c]=!state.done.cc[c]; dbRef.set(state); renderAll(); }; tags.appendChild(t); });
      div.appendChild(tags); block.appendChild(div);
    });

    empNames.forEach(p=>{
      const div=document.createElement('div'); div.className='person-block';
      div.innerHTML='<div class="person-name">'+p+'</div>';
      const tags=document.createElement('div'); tags.className='person-tags';
      empList.forEach(c=>{ const t=document.createElement('span'); t.className='tag tag-emp'; t.textContent=c; t.onclick=()=>{ state.done.emp[c]=!state.done.emp[c]; dbRef.set(state); renderAll(); }; tags.appendChild(t); });
      div.appendChild(tags); block.appendChild(div);
    });
  }

  let selectedDow=(new Date().getDay()>=1 && new Date().getDay()<=5)?new Date().getDay():1;

  function renderAll(){
    const key=DAY_MAP[selectedDow];
    document.getElementById('day-badge').textContent=DAY_NAMES[selectedDow]||'—';
    const ccList=parseList(state.cc).filter(c=>AVAIL[c]?.includes(key));
    const empList=parseList(state.emp).filter(c=>AVAIL[c]?.includes(key));
    renderTags(ccList,'tag-cc','cc-tags','cc-total');
    renderTags(empList,'tag-emp','emp-tags','emp-total');
    document.getElementById('hoje-pessoa').textContent=state.escala[selectedDow];
    renderEscala(selectedDow);
    renderPeople(selectedDow);
    document.getElementById('inp-cc').value=state.cc;
    document.getElementById('inp-emp').value=state.emp;
    document.getElementById('inp-escala').value=Object.entries(state.escala).map(([d,n])=>DAY_NAMES[d]+': '+n).join('\n');
  }

  // Aplicar demandas
  document.getElementById('btn-apply-dem').onclick=()=>{
    const ccVal=document.getElementById('inp-cc').value.trim();
    const empVal=document.getElementById('inp-emp').value.trim();
    if(ccVal) state.cc=ccVal.toUpperCase();
    if(empVal) state.emp=empVal.toUpperCase();
    dbRef.set(state);
  };

  // Aplicar escala
  document.getElementById('btn-apply-esc').onclick=()=>{
    const val=document.getElementById('inp-escala').value.trim().split(/\n/);
    [1,2,3,4,5].forEach((d,i)=>{ state.escala[d]=val[i]?.split(':')[1]?.trim()||state.escala[d]; });
    dbRef.set(state);
  };

  renderAll();
</script>
</body>
</html>
