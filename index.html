<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<style>
  /* ===================== CSS ORIGINAL ===================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #0c447c; --info-border: rgba(12,68,124,0.25);
    --success-bg: #eaf3de; --success-text: #27500a; --success-border: rgba(39,80,10,0.25);
    --warn-bg: #fff4e0; --warn-text: #7a4800; --warn-border: rgba(122,72,0,0.25);
    --danger-bg: #fdecea; --danger-text: #8c1a11; --danger-border: rgba(140,26,17,0.2);
    --radius-md: 8px; --radius-lg: 12px;
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;
      --text: #f0efe8; --text2: #9a9a94; --text3: #6a6a64;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --info-bg: #042c53; --info-text: #85b7eb; --info-border: rgba(133,183,235,0.25);
      --success-bg: #173404; --success-text: #97c459; --success-border: rgba(151,196,89,0.25);
      --warn-bg: #3a2200; --warn-text: #f5b942; --warn-border: rgba(245,185,66,0.25);
      --danger-bg: #3b0f0a; --danger-text: #f08078; --danger-border: rgba(240,128,120,0.2);
    }
  }
  body { background: var(--bg3); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; flex-wrap: wrap; gap: 8px; }
  .title { font-size: 20px; font-weight: 500; }
  .day-badge { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-lg); background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); cursor: pointer; user-select: none; }
  .day-badge.preview { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
  .sync-bar { font-size: 12px; color: var(--text3); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; flex-shrink: 0; }
  .sync-dot.ok { background: #4caf50; }
  .sync-dot.loading { background: var(--warn-text); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 12px; margin-bottom: 1rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .total-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-md); background: var(--bg2); color: var(--text2); }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: var(--radius-md); }
  .tag-cc { background: #e6f1fb; color: #0c447c; }
  .tag-emp { background: #eaf3de; color: #27500a; }
  .empty { font-size: 13px; color: var(--text3); font-style: italic; }
  .escala-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .escala-name { font-size: 22px; font-weight: 500; }
  .escala-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .escala-week { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: .75rem; }
  .escala-day { font-size: 12px; padding: 6px 8px; border-radius: var(--radius-md); border: 0.5px solid var(--border); text-align: center; background: var(--bg2); cursor: pointer; transition: transform .1s, box-shadow .1s; }
  .escala-day:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .escala-day.today { background: var(--success-bg); border-color: var(--success-border); }
  .escala-day.selected { background: var(--info-bg); border-color: var(--info-border); box-shadow: 0 0 0 2px var(--info-text); }
  .escala-day.today.selected { background: var(--info-bg); border-color: var(--info-border); }
  .d-name { font-weight: 500; font-size: 11px; color: var(--text2); }
  .d-person { font-size: 12px; font-weight: 500; color: var(--text); }
  .escala-day.today .d-name, .escala-day.today .d-person { color: var(--success-text); }
  .escala-day.selected .d-name, .escala-day.selected .d-person { color: var(--info-text); }
  .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
  .update-area { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; }
  .update-area h3 { font-size: 14px; font-weight: 500; margin-bottom: .75rem; }
  .section-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: .35rem; }
  textarea { width: 100%; font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: var(--bg); color: var(--text); resize: vertical; font-family: var(--font); line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--info-text); }
  .btn-row { display: flex; gap: 8px; margin-top: .5rem; flex-wrap: wrap; }
  button { font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: var(--font); }
  button:hover { background: var(--bg3); }
  button.primary { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
  button.danger { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }
  .notice { font-size: 12px; color: var(--success-text); background: var(--success-bg); border: 0.5px solid var(--success-border); border-radius: var(--radius-md); padding: 6px 10px; margin-top: .5rem; display: none; }
  .mt6 { margin-top: .75rem; }

  /* Histórico */
  .hist-section { margin-top: .5rem; }
  .hist-section h3 { font-size: 14px; font-weight: 500; margin-bottom: .75rem; color: var(--text); }
  .hist-empty { font-size: 13px; color: var(--text3); font-style: italic; }
  .hist-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: .85rem 1rem; margin-bottom: .5rem; }
  .hist-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin-bottom: .5rem; }
  .hist-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 2px 8px; border-radius: var(--radius-md); }
  .hist-type.emp { background: var(--success-bg); color: var(--success-text); }
  .hist-type.cc  { background: var(--info-bg); color: var(--info-text); }
  .hist-type.escala { background: var(--warn-bg); color: var(--warn-text); }
  .hist-time { font-size: 12px; color: var(--text3); }
  .hist-diff { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hist-col { font-size: 12px; }
  .hist-col-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 3px; }
  .hist-col-val { color: var(--text); line-height: 1.5; word-break: break-word; }
  .hist-col.old .hist-col-val { color: var(--text3); text-decoration: line-through; }
  .hist-col.new .hist-col-val { color: var(--text); }
  .hist-revert { margin-top: .5rem; }

  /* ===================== BLOCO DISTRIBUIÇÃO ===================== */
  .dist-person { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px; margin-bottom: 8px; }
  .dist-name { font-weight: 600; margin-bottom: 6px; }
  .clickable { cursor:pointer; transition: all .15s ease; }
  .clickable:hover { transform: scale(1.05); }
  .clickable.selected { background: var(--success-bg); color: var(--success-text); }
  .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; }
  .modal-box { background: var(--bg); padding: 20px; border-radius: 12px; min-width: 250px; }
</style>
</head>

<body>
<div class="container">
  <!-- cabeçalho e cards existentes -->

  <!-- 🔹 Atualizar demandas (CC primeiro) -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div class="section-label">CC — lista de países</div>
    <textarea id="inp-cc" rows="2" placeholder="BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR"></textarea>
    <div class="section-label mt6">EMP — lista de países</div>
    <textarea id="inp-emp" rows="2" placeholder="MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE"></textarea>
    <div class="btn-row">
      <button class="primary" id="btn-apply-dem">Aplicar demandas</button>
      <button id="btn-reset-dem">Restaurar padrão</button>
    </div>
    <div class="notice" id="notice-dem">✓ Demandas salvas e sincronizadas para todos!</div>
  </div>

  <!-- 🔹 Novo bloco de distribuição -->
  <div class="update-area">
    <h3>Distribuição de demandas do dia</h3>
    <div id="dist-cc"></div>
    <div class="divider"></div>
    <div id="dist-emp"></div>
  </div>

  <!-- restante do HTML (escala, histórico) -->

</div>

<!-- MODAL -->
<div id="domain-modal" class="modal">
  <div class="modal-box">
    <div id="modal-content"></div>
    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>
