<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<style>
/* (mantive seu CSS original e adicionei melhorias abaixo) */

.clickable { cursor:pointer; transition:.15s; }
.clickable:hover { transform:scale(1.05); }

.clickable.selected {
  background:#eaf3de;
  color:#27500a;
}

.dist-person {
  border:1px solid #ccc;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}

.dist-name {
  font-weight:bold;
  margin-bottom:6px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:#fff;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔹 BLOCO DEMANDAS -->
<div class="update-area">
  <h3>Atualizar demandas</h3>

  <!-- CC primeiro -->
  <div class="section-label">CC — lista de países</div>
  <textarea id="inp-cc"></textarea>

  <div class="section-label">EMP — lista de países</div>
  <textarea id="inp-emp"></textarea>

  <button onclick="applyDem()">Salvar</button>
</div>

<!-- 🔹 NOVO BLOCO -->
<div class="update-area">
  <h3>Distribuição de demandas do dia</h3>

  <div id="dist-cc"></div>

  <hr>

  <div id="dist-emp"></div>
</div>

</div>

<!-- MODAL -->
<div id="domain-modal" class="modal">
  <div class="modal-box">
    <div id="modal-content"></div>
    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
// FIREBASE
firebase.initializeApp({
  apiKey: "xxx",
  databaseURL: "xxx"
});
const db = firebase.database();

// LISTAS
const PEOPLE_CC = ['LUIZA','LUCAS','LÉO','RYAN','PEDRO'];
const PEOPLE_EMP_BASE = ['WALDIR','VICTOR'];

// DOMÍNIOS (já limpos)
const DOMAIN_MAP = {
  BR:['vouquitar','cardfacil'],
  NL:['dekredit'],
  US:['gotallcards'],
  IN:['wheresmycard'],
  MX:['mejoresopciones','unum/mx'],
  AU:['unum/au'],
  TH:['batkredit'],
  PH:['unum/ph'],
  AR:['tarjetasargentinas','solicitecartao'],
  CO:['tarjetaahora'],
  CL:['unum/cl'],
  PE:['unum/pe'],
  DE:['dekreditkarte','unum/de'],
  FR:['unum/fr'],
  BE:['antivora'],
  TR:['kredinow'],
  VN:['ttdtm'],
  GR:['athivor'],
  ID:['unum/id'],
  EG:['unum/eg'],
  JP:['justgreatcards'],
  AE:['moneycredithub']
};

// MOCK (usa seu state real depois)
let state = {
  cc: "BR AR US",
  emp: "MX AR US",
  escala: {1:'Luiza',2:'Pedro',3:'Leo',4:'Ryan',5:'LUIZA'}
};

const AVAIL = {
  BR:['seg','ter','qua','qui','sex'],
  US:['seg','ter','qua','qui','sex'],
  AR:['seg','qua','qui','sex'],
  MX:['seg','qua','sex']
};

const DAY_MAP = {1:'seg',2:'ter',3:'qua',4:'qui',5:'sex'};
let selectedDow = 1;

// PARSE
function parseList(str){
  return str.split(/[\s,-]+/).map(s=>s.trim()).filter(Boolean);
}

// 🔥 RENDER PRINCIPAL
function renderDistribuicao(){
  const key = DAY_MAP[selectedDow];

  const ccList = parseList(state.cc).filter(c => AVAIL[c]?.includes(key));
  const empList = parseList(state.emp).filter(c => AVAIL[c]?.includes(key));

  const responsavel = state.escala[selectedDow];

  const peopleEmp = PEOPLE_EMP_BASE.concat(
    responsavel && !PEOPLE_EMP_BASE.includes(responsavel)
      ? [responsavel]
      : []
  );

  renderGrupo('dist-cc', PEOPLE_CC, ccList);
  renderGrupo('dist-emp', peopleEmp, empList);
}

// RENDER GRUPO
function renderGrupo(id, pessoas, lista){
  const el = document.getElementById(id);

  el.innerHTML = pessoas.map(nome => `
    <div class="dist-person">
      <div class="dist-name">${nome}</div>
      ${lista.map(p => `
        <span class="clickable" onclick="toggleTag(this,'${p}')">${p}</span>
      `).join(' ')}
    </div>
  `).join('');
}

// CLICK
function toggleTag(el, pais){
  el.classList.toggle('selected');
  showDomains(pais);
}

// MODAL
function showDomains(pais){
  const doms = DOMAIN_MAP[pais] || [];

  document.getElementById('modal-content').innerHTML =
    `<b>${pais}</b><br><br>` +
    doms.map(d => '• ' + d).join('<br>');

  document.getElementById('domain-modal').style.display='flex';
}

function closeModal(){
  document.getElementById('domain-modal').style.display='none';
}

// INIT
renderDistribuicao();
</script>

</body>
</html>
