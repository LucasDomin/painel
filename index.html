<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<style>
body { background:#efefec; font-family:Arial; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.tag { padding:5px 10px; border-radius:6px; margin:3px; display:inline-block; cursor:pointer; }
.tag-cc { background:#e6f1fb; }
.tag-emp { background:#eaf3de; }
.done { background:#4caf50 !important; color:#fff; }
.user-card { background:#f5f5f5; padding:10px; border-radius:8px; margin-bottom:6px; }
</style>
</head>

<body>

<h2>Painel de campanhas</h2>

<div class="card">
<h3>Cartão de crédito — disponíveis</h3>
<div id="cc-tags"></div>
</div>

<div class="card">
<h3>Empréstimo — disponíveis</h3>
<div id="emp-tags"></div>
</div>

<div class="card">
<h3>Escala de empréstimo</h3>
<div id="escala"></div>
</div>

<div class="card">
<h3>Atualizar demandas</h3>

<b>CC</b>
<textarea id="inp-cc"></textarea>

<b>EMP</b>
<textarea id="inp-emp"></textarea>

<br><br>
<button onclick="saveDemand()">Salvar</button>
</div>

<div class="card">
<h3>Atualizar escala</h3>
<textarea id="inp-escala"></textarea>
<br><br>
<button onclick="saveEscala()">Salvar escala</button>
</div>

<div class="card">
<h3>Equipe Crédito</h3>
<div id="team-cc"></div>
</div>

<div class="card">
<h3>Equipe Empréstimo</h3>
<div id="team-emp"></div>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="history"></div>
</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD_dbH5tloT-y29vrwo9UIjroz_MaxQgf0",
  authDomain: "paises-diarios.firebaseapp.com",
  databaseURL: "https://paises-diarios-default-rtdb.firebaseio.com",
  projectId: "paises-diarios"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= BASE ================= */

const AVAIL = {
BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'],
US:['seg','ter','qua','qui','sex'], IN:['ter','qua','qui'],
MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'],
PH:['seg','qui','sex'], AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'],
CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'],
DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'],
BE:['seg','ter','qua','qui','sex'], TR:['seg','qua','sex'], VN:['seg','qua','sex'],
GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'],
JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex']
};

const DOMAINS = {
BR:['vouquitar','cardfacil'],
NL:['dekredit'], US:['gotallcards'], IN:['wheresmycard'],
MX:['mejoresopciones','unum.mx'], AU:['unum.au'], TH:['batkredit'],
PH:['unum.ph'], AR:['tarjetasargentinas','solicitecartao'],
CO:['tarjetaahora'], CL:['unum.cl'], PE:['unum.pe'],
DE:['dekreditkarte','unum.de'], FR:['unum.fr'],
BE:['antivora'], TR:['kredinow'], VN:['ttdtm'],
GR:['athivor'], ID:['unum.id'], EG:['unum.eg'],
JP:['justgreatcards'], AE:['moneycredithub']
};

/* ================= STATE ================= */

let state = { cc:'', emp:'', escala:{} };
let done = {};
let history = [];
let selectedDay = new Date().getDay();

/* ================= HELPERS ================= */

function parse(str){
return str.toUpperCase().split(/[\s,-]+/).filter(x=>x);
}

function getKey(d){
return ['','seg','ter','qua','qui','sex',''][d];
}

/* ================= RENDER ================= */

function render(){

const key = getKey(selectedDay);

let cc = parse(state.cc).filter(p=>AVAIL[p]?.includes(key));
let emp = parse(state.emp).filter(p=>AVAIL[p]?.includes(key));

/* REMOVE EMP DO CC */
emp.forEach(p=>{
cc = cc.filter(c=>c!==p);
});

/* TAGS */
renderTags(cc,'cc-tags','tag-cc','cc');
renderTags(emp,'emp-tags','tag-emp','emp');

/* ESCALA */
renderEscala();

/* EQUIPES */
renderTeams(cc,emp);

/* HISTÓRICO */
renderHistory();
}

/* ================= TAGS ================= */

function renderTags(list,id,cls,type){

const el=document.getElementById(id);
el.innerHTML='';

list.forEach(p=>{
const tag=document.createElement('span');
tag.className='tag '+cls;

if(done[type]?.[p]) tag.classList.add('done');

tag.innerText=p;

/* HOVER DOMÍNIO */
tag.title = DOMAINS[p]?.join(' / ') || '';

/* CLICK */
tag.onclick=()=>{
done[type]=done[type]||{};
done[type][p]=!done[type][p];

db.ref('done').set(done);
addHistory(type,p);

render();
};

el.appendChild(tag);
});

}

/* ================= ESCALA ================= */

function renderEscala(){
const el=document.getElementById('escala');
el.innerHTML='';

['Seg','Ter','Qua','Qui','Sex'].forEach((d,i)=>{
const div=document.createElement('div');
div.className='tag';
div.innerText=d+' - '+(state.escala[i+1]||'-');

div.onclick=()=>{
selectedDay = i+1;
render();
};

el.appendChild(div);
});
}

/* ================= EQUIPES ================= */

function renderTeams(cc,emp){

const creditTeam=['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO'];
const empTeam=['WALDIR','VICTOR'];

/* REMOVE RESPONSÁVEL DO DIA DO CRÉDITO */
const resp = state.escala[selectedDay];
const creditFiltered = creditTeam.filter(n=>n!==resp);

/* CRÉDITO */
document.getElementById('team-cc').innerHTML =
creditFiltered.map(n=>`
<div class="user-card">
<b>${n}</b><br>${cc.join(' ')}
</div>`).join('');

/* EMPRÉSTIMO */
document.getElementById('team-emp').innerHTML =
[...empTeam, resp].map(n=>`
<div class="user-card">
<b>${n||'-'}</b><br>${emp.join(' ')}
</div>`).join('');

}

/* ================= HISTÓRICO ================= */

function addHistory(type,p){
const item={
type,
pais:p,
time:new Date().toLocaleString()
};

history.push(item);
db.ref('history').set(history);
}

function renderHistory(){
document.getElementById('history').innerHTML =
history.map(h=>`<div>${h.time} - ${h.type} - ${h.pais}</div>`).join('');
}

/* ================= SAVE ================= */

function saveDemand(){
state.cc=document.getElementById('inp-cc').value;
state.emp=document.getElementById('inp-emp').value;
db.ref('painel').set(state);
}

function saveEscala(){
const lines=document.getElementById('inp-escala').value.split('\n');
const esc={};

lines.forEach(l=>{
const [d,n]=l.split(':');
if(d && n) esc[d.trim()]=n.trim();
});

state.escala=esc;
db.ref('painel').set(state);
}

/* ================= FIREBASE ================= */

db.ref('painel').on('value',snap=>{
if(snap.val()){ state=snap.val(); render(); }
});

db.ref('done').on('value',snap=>{
done=snap.val()||{}; render();
});

db.ref('history').on('value',snap=>{
history=snap.val()||[]; render();
});

</script>

</body>
</html>
