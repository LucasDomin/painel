<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Campanhas</title>

<style>
:root{
--bg:#ffffff;
--bg2:#f5f5f3;
--bg3:#efefec;
--text:#1a1a18;
--text2:#6b6b67;
--border:rgba(0,0,0,.12);
--info-bg:#e6f1fb;
--success-bg:#eaf3de;
}

body{background:var(--bg3);font-family:Arial;padding:20px}
.container{max-width:900px;margin:auto}

.header{display:flex;justify-content:space-between;margin-bottom:20px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.card{background:#fff;padding:15px;border-radius:10px;border:1px solid var(--border)}

.tag{
padding:5px 10px;
border-radius:6px;
font-size:12px;
position:relative;
cursor:pointer;
display:inline-block;
margin:3px;
}

.tag-cc{background:#e6f1fb}
.tag-emp{background:#eaf3de}

.tooltip{
display:none;
position:absolute;
bottom:-28px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
font-size:11px;
padding:4px 6px;
border-radius:4px;
white-space:nowrap;
}

.tag:hover .tooltip{display:block}

.escala-week{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
margin-top:10px
}

.escala-day{
background:#eee;
padding:8px;
text-align:center;
cursor:pointer;
border-radius:6px
}

.today{
background:#c8f7c5
}

textarea{
width:100%;
margin-top:5px;
margin-bottom:5px;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h2>Painel de campanhas</h2>
<div id="day"></div>
</div>

<div class="grid2">

<div class="card">
<b>Cartão de crédito</b>
<div id="cc"></div>
</div>

<div class="card">
<b>Empréstimo</b>
<div id="emp"></div>
</div>

</div>

<div class="card">
<b>Escala</b>
<div id="resp"></div>
<div class="escala-week" id="week"></div>
</div>

<div class="card">
<b>Atualizar demandas</b>
CC:
<textarea id="inp-cc"></textarea>
EMP:
<textarea id="inp-emp"></textarea>
<button onclick="saveDem()">Salvar</button>
</div>

<div class="card">
<b>Atualizar escala</b>
<textarea id="inp-esc"></textarea>
<button onclick="saveEsc()">Salvar</button>
</div>

</div>

<script>

/* ================= BASE ================= */

const DEFAULTS={
cc:'BR AR MX US DE JP TR AU PH BE TH CO NL PE FR',
emp:'MX AR US AU VN PH CL GR CO AE PE BE',
escala:{1:'LUIZA',2:'LUCAS',3:'LÉO',4:'RYAN',5:'PEDRO'}
};

let state=JSON.parse(JSON.stringify(DEFAULTS));

const AVAIL={
BR:['seg','ter','qua','qui','sex'],
US:['seg','ter','qua','qui','sex'],
MX:['seg','qua','sex'],
AR:['seg','qua','qui','sex'],
DE:['seg','ter','qua','qui','sex'],
JP:['seg','ter','qua','qui','sex'],
TH:['seg','ter','qui'],
FR:['seg','ter','qua','qui','sex'],
NL:['seg','qua','sex'],
PH:['seg','qui','sex'],
CO:['seg','qua','qui','sex'],
PE:['seg','ter','qua','qui'],
BE:['seg','ter','qua','qui','sex'],
AU:['seg','ter','qui'],
TR:['seg','qua','sex'],
VN:['seg','qua','sex'],
GR:['seg','ter','qui'],
CL:['seg','ter','qua','qui'],
AE:['seg','ter','qua','qui','sex']
};

const DOMAINS={
BR:['vouquitar','cardfacil'],
NL:['dekredit'],
US:['gotallcards'],
MX:['mejoresopciones','unum.mx'],
AU:['unum.au'],
TH:['batkredit'],
PH:['unum.ph'],
AR:['tarjetasargentinas','solicitecartao'],
CO:['tarjetaahora'],
CL:['unum.cl'],
PE:['unum.pe'],
DE:['dekreditkarte','unum.de'],
FR:['unum.fr'],
BE:['antivora'],
TR:['kredinow'],
VN:['ttdtm'],
GR:['athivor'],
JP:['justgreatcards'],
AE:['moneycredithub']
};

const DAYMAP={1:'seg',2:'ter',3:'qua',4:'qui',5:'sex'};
const DAYNAME={1:'Seg',2:'Ter',3:'Qua',4:'Qui',5:'Sex'};

/* ================= CORE ================= */

function parse(str){
return str.split(/[\s,-]+/).filter(Boolean);
}

function today(){
let d=new Date().getDay();
return (d>=1&&d<=5)?d:1;
}

function filter(list,dow){
return list.filter(c=>AVAIL[c]?.includes(DAYMAP[dow]));
}

/* ================= RENDER ================= */

function render(dow=today()){

document.getElementById('day').innerText=DAYNAME[dow];

let cc=filter(parse(state.cc),dow);
let emp=filter(parse(state.emp),dow);

document.getElementById('cc').innerHTML=cc.map(c=>tag(c,'tag-cc')).join('');
document.getElementById('emp').innerHTML=emp.map(c=>tag(c,'tag-emp')).join('');

document.getElementById('resp').innerHTML='<b>'+state.escala[dow]+'</b>';

renderWeek(dow);
}

/* ================= TAG ================= */

function tag(c,cls){
let dom=(DOMAINS[c]||[]).join(' | ');
return `
<span class="tag ${cls}">
${c}
<span class="tooltip">${dom}</span>
</span>
`;
}

/* ================= ESCALA ================= */

function renderWeek(dow){
let el=document.getElementById('week');
el.innerHTML='';

[1,2,3,4,5].forEach(d=>{
let div=document.createElement('div');
div.className='escala-day'+(d==dow?' today':'');
div.innerHTML=DAYNAME[d]+'<br>'+state.escala[d];
div.onclick=()=>render(d);
el.appendChild(div);
});
}

/* ================= STORAGE ================= */

async function load(){
try{
let dem=await window.storage?.get('dem',true);
let esc=await window.storage?.get('esc',true);

if(dem?.value){
let d=JSON.parse(dem.value);
state.cc=d.cc||state.cc;
state.emp=d.emp||state.emp;
}

if(esc?.value){
state.escala=JSON.parse(esc.value);
}
}catch(e){
console.log('fallback local');
let s=localStorage.getItem('painel');
if(s) state=JSON.parse(s);
}

render();
}

async function saveDem(){
state.cc=document.getElementById('inp-cc').value||state.cc;
state.emp=document.getElementById('inp-emp').value||state.emp;

try{
await window.storage?.set('dem',JSON.stringify({cc:state.cc,emp:state.emp}),true);
}catch(e){
localStorage.setItem('painel',JSON.stringify(state));
}

render();
}

async function saveEsc(){
let txt=document.getElementById('inp-esc').value.split('\n');

[1,2,3,4,5].forEach((d,i)=>{
if(txt[i]) state.escala[d]=txt[i].split(':')[1]?.trim()||txt[i];
});

try{
await window.storage?.set('esc',JSON.stringify(state.escala),true);
}catch(e){
localStorage.setItem('painel',JSON.stringify(state));
}

render();
}

/* ================= INIT ================= */

load();

</script>
</body>
</html>
