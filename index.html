<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>
<style>
body { font-family:Arial; background:#efefec; padding:20px; }
.container { max-width:900px; margin:auto; }

.card { background:#fff; padding:15px; border-radius:10px; border:1px solid #ccc; margin-bottom:10px; }
.section-label { font-weight:bold; margin-top:10px; display:block; }

.clickable { cursor:pointer; padding:4px 8px; border-radius:6px; display:inline-block; margin:2px; transition:.15s; background:#e6f1fb; }
.clickable:hover { transform:scale(1.05); }
.clickable.selected { background:#d4edda; color:#27500a; }

.dist-person { border:1px solid #ccc; border-radius:8px; padding:10px; margin-bottom:10px; }
.dist-name { font-weight:bold; margin-bottom:6px; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; }
.modal-box { background:#fff; padding:20px; border-radius:12px; max-width:300px; }
</style>
</head>

<body>
<div class="container">

<!-- Atualizar demandas -->
<div class="card">
  <h3>Atualizar demandas</h3>
  <span class="section-label">CC — lista de países</span>
  <textarea id="inp-cc" rows="2">BR AR US IN MX AU TH PH NL PE CL DE FR BE TR VN GR ID EG JP AE</textarea>

  <span class="section-label">EMP — lista de países</span>
  <textarea id="inp-emp" rows="2">BR AR US IN MX AU TH PH NL PE CL DE FR BE TR VN GR ID EG JP AE</textarea>

  <button onclick="applyDem()">Salvar demandas</button>
</div>

<!-- Distribuição do dia -->
<div class="card">
  <h3>Distribuição de demandas do dia</h3>
  <div id="dist-cc"></div>
  <hr>
  <div id="dist-emp"></div>
</div>

</div>

<!-- MODAL DOMÍNIOS -->
<div id="domain-modal" class="modal">
  <div class="modal-box">
    <div id="modal-content"></div>
    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
// DOMÍNIOS POR PAÍS
const DOMAIN_MAP = {
  BR:['vouquitar','cardfacil'], NL:['dekredit'], US:['gotallcards'], IN:['wheresmycard'],
  MX:['mejoresopciones','unum.mx'], AU:['unum.au'], TH:['batkredit'], PH:['unum.ph'],
  AR:['tarjetasargentinas','solicitecartao'], CO:['tarjetaahora'], CL:['unum.cl'], PE:['unum.pe'],
  DE:['dekreditkarte','unum.de'], FR:['unum.fr'], BE:['antivora'], TR:['kredinow'], VN:['ttdtm'],
  GR:['athivor'], ID:['unum.id'], EG:['unum.eg'], JP:['justgreatcards'], AE:['moneycredithub']
};

// PESSOAS
const PEOPLE_CC = ['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO'];
const PEOPLE_EMP_BASE = ['WALDIR','VICTOR'];

// DISPONIBILIDADE POR DIA
const AVAIL = {
  BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'], US:['seg','ter','qua','qui','sex'], IN:['ter','qua','qui'],
  MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'], PH:['seg','qui','sex'],
  AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'], CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'],
  DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'], BE:['seg','ter','qua','qui','sex'],
  TR:['seg','qua','sex'], VN:['seg','qua','sex'], GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'],
  JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex']
};

// ESCALA
let escala = {1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'};

// ESTADO
let state = { cc:'BR AR US IN MX AU TH PH NL PE CL DE FR BE TR VN GR ID EG JP AE',
              emp:'BR AR US IN MX AU TH PH NL PE CL DE FR BE TR VN GR ID EG JP AE' };
let selectedDow = new Date().getDay(); // 0=Domingo

if(selectedDow===0 || selectedDow===6) selectedDow=1; // se fim de semana, mostra segunda

function parseList(str){ return str.split(/[\s,-]+/).map(s=>s.trim()).filter(Boolean); }

function applyDem(){
  state.cc = document.getElementById('inp-cc').value;
  state.emp = document.getElementById('inp-emp').value;
  renderDistribuicao();
}

// RENDER DISTRIBUIÇÃO
function renderDistribuicao(){
  const key = ['seg','ter','qua','qui','sex'][selectedDow-1];

  let ccList = parseList(state.cc).filter(c=>AVAIL[c]?.includes(key));
  let empList = parseList(state.emp).filter(c=>AVAIL[c]?.includes(key));

  // remover países EMP da lista CC
  ccList = ccList.filter(c=>!empList.includes(c));

  const responsavel = escala[selectedDow];

  const peopleEmp = PEOPLE_EMP_BASE.concat(responsavel && !PEOPLE_EMP_BASE.includes(responsavel)?[responsavel]:[]);

  renderGrupo('dist-cc', PEOPLE_CC, ccList);
  renderGrupo('dist-emp', peopleEmp, empList);
}

// RENDER POR GRUPO
function renderGrupo(id, pessoas, lista){
  const el = document.getElementById(id);
  el.innerHTML = pessoas.map(nome=>`
    <div class="dist-person">
      <div class="dist-name">${nome}</div>
      ${lista.map(p=>`<span class="clickable" onclick="toggleTag(this,'${p}')">${p}</span>`).join(' ')}
    </div>
  `).join('');
}

// CLICK
function toggleTag(el,pais){
  el.classList.toggle('selected');
  showDomains(pais);
}

// MODAL
function showDomains(pais){
  const doms = DOMAIN_MAP[pais] || [];
  document.getElementById('modal-content').innerHTML = `<b>${pais}</b><br>${doms.map(d=>'• '+d).join('<br>')}`;
  document.getElementById('domain-modal').style.display='flex';
}
function closeModal(){ document.getElementById('domain-modal').style.display='none'; }

// INIT
renderDistribuicao();
</script>
</body>
</html>  <div>
    <button class="primary" id="btn-apply-esc">Aplicar escala</button>
    <button id="btn-reset-esc">Restaurar escala</button>
  </div>
</div>

<!-- Blocos de pessoas para o dia -->
<div id="people-block"></div>

<!-- Cartões de Disponíveis Hoje -->
<div class="card">
  <b>Cartão de crédito — disponíveis hoje</b>
  <div id="cc-tags"></div>
</div>
<div class="card">
  <b>Empréstimo — disponíveis hoje</b>
  <div id="emp-tags"></div>
</div>

<!-- Escala visual -->
<div class="card">
  <b>Escala</b>
  <div id="hoje-pessoa"></div>
  <div class="escala-week" id="escala-week"></div>
</div>

</div>

<script>
const STORAGE_KEY='painel_v4';
const DOMAINS={BR:['vouquitar','cardfacil'],NL:['dekredit'],US:['gotallcards'],IN:['wheresmycard'],MX:['mejoresopciones','unum.mx'],AU:['unum.au'],TH:['batkredit'],PH:['unum.ph'],AR:['tarjetasargentinas','solicitecartao'],CO:['tarjetaahora'],CL:['unum.cl'],PE:['unum.pe'],DE:['dekreditkarte','unum.de'],FR:['unum.fr'],BE:['antivora'],TR:['kredinow'],VN:['ttdtm'],GR:['athivor'],ID:['unum.id'],EG:['unum.eg'],JP:['justgreatcards'],AE:['moneycredithub']};
const AVAIL={BR:['seg','ter','qua','qui','sex'],NL:['seg','qua','sex'],US:['seg','ter','qua','qui','sex'],IN:[],MX:['seg','qua','sex'],AU:['seg','ter','qui'],TH:['seg','ter','qui'],PH:['seg','qui','sex'],AR:['seg','qua','qui','sex'],CO:['seg','qua','qui','sex'],CL:['seg','ter','qua','qui'],PE:['seg','ter','qua','qui'],DE:['seg','ter','qua','qui','sex'],FR:['seg','ter','qua','qui','sex'],BE:['seg','ter','qua','qui','sex'],TR:['seg','qua','sex'],VN:['seg','qua','sex'],GR:['seg','ter','qui'],ID:['seg','ter','qui'],EG:['seg','ter','qui'],JP:['seg','ter','qua','qui','sex'],AE:['seg','ter','qua','qui','sex']};
const DAY_MAP={0:null,1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:null};
const DAY_NAMES={1:'Segunda-feira',2:'Terça-feira',3:'Quarta-feira',4:'Quinta-feira',5:'Sexta-feira'};
let state={cc:Object.keys(DOMAINS).join(' - '),emp:Object.keys(DOMAINS).join(' - '),escala:{1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'},done:{'tag-cc':{},'tag-emp':{}},history:[]};

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }
function load(){ const s=localStorage.getItem(STORAGE_KEY); if(s) state=JSON.parse(s); }

function parse(str){ return str.split(/[\s\-]+/).filter(Boolean); }

function renderTags(list,cls,id){
  const el=document.getElementById(id);
  el.innerHTML='';
  list.forEach(c=>{
    const tag=document.createElement('span');
    tag.className=`tag ${cls} ${state.done[cls][c]?'done':''}`;
    tag.textContent=c;
    const tt=document.createElement('span');
    tt.className='tooltip';
    tt.textContent=DOMAINS[c]?.join(' ')||'';
    tag.appendChild(tt);
    tag.onclick=()=>{
      state.done[cls][c]=!state.done[cls][c];
      state.history.unshift({country:c,cls,done:state.done[cls][c],date:new Date().toLocaleString()});
      if(state.history.length>100) state.history.pop();
      save();
      renderPeople(getToday());
    };
    el.appendChild(tag);
  });
}

function getToday(){ const d=new Date().getDay(); return (d>=1&&d<=5)?d:1; }

function renderEscala(dow){
  const el=document.getElementById('escala-week');
  el.innerHTML='';
  [1,2,3,4,5].forEach(d=>{
    const div=document.createElement('div');
    div.className='escala-day'+(d===dow?' today':'');
    div.innerHTML=`${DAY_NAMES[d]}<br>${state.escala[d]}`;
    div.onclick=()=>renderPeople(d);
    el.appendChild(div);
  });
}

function renderPeople(dow){
  const block=document.getElementById('people-block');
  block.innerHTML='';
  const respEmp=state.escala[dow];

  const ccList=parse(state.cc).filter(c=>AVAIL[c]?.includes(DAY_MAP[dow]));
  let empList=parse(state.emp).filter(c=>AVAIL[c]?.includes(DAY_MAP[dow]));

  // Exclusão cruzada: países do dia de EMP não aparecem no CC
  const ccDisponivel=ccList.filter(c=>!empList.includes(c));

  // Bloco Crédito
  const creditNames=['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO'];
  creditNames.forEach(name=>{
    const div=document.createElement('div'); div.className='person-block';
    div.innerHTML=`<b>${name}</b>`;
    ccDisponivel.forEach(c=>{
      const t=document.createElement('span');
      t.className='tag tag-cc';
      t.textContent=c;
      const tt=document.createElement('span'); tt.className='tooltip';
      tt.textContent=DOMAINS[c]?.join(' ')||''; t.appendChild(tt);
      t.onclick=()=>{ t.classList.toggle('done'); state.done['tag-cc'][c]=t.classList.contains('done'); save(); };
      div.appendChild(t);
    });
    block.appendChild(div);
  });

  // Bloco Empréstimo
  const loanNames=['WALDIR','VICTOR',respEmp];
  loanNames.forEach(name=>{
    if(!name) return;
    const div=document.createElement('div'); div.className='person-block';
    div.innerHTML=`<b>${name}</b>`;
    empList.forEach(c=>{
      const t=document.createElement('span');
      t.className='tag tag-emp';
      t.textContent=c;
      const tt=document.createElement('span'); tt.className='tooltip';
      tt.textContent=DOMAINS[c]?.join(' ')||''; t.appendChild(tt);
      t.onclick=()=>{ t.classList.toggle('done'); state.done['tag-emp'][c]=t.classList.contains('done'); save(); };
      div.appendChild(t);
    });
    block.appendChild(div);
  });

  // Atualiza os cards de disponíveis hoje
  renderTags(ccDisponivel,'tag-cc','cc-tags');
  renderTags(empList,'tag-emp','emp-tags');
  document.getElementById('day-badge').textContent=DAY_NAMES[dow];
  document.getElementById('hoje-pessoa').textContent=respEmp;
  renderEscala(dow);
}

// Botões
document.getElementById('btn-apply-dem').onclick=function(){
  const c=document.getElementById('inp-cc').value.trim();
  const e=document.getElementById('inp-emp').value.trim();
  if(c) state.cc=c;
  if(e) state.emp=e;
  save();
  renderPeople(getToday());
};
document.getElementById('btn-reset-dem').onclick=function(){
  state.cc=Object.keys(DOMAINS).join(' - ');
  state.emp=Object.keys(DOMAINS).join(' - ');
  save();
  renderPeople(getToday());
};
document.getElementById('btn-apply-esc').onclick=function(){
  const val=document.getElementById('inp-escala').value.trim().split(/\n/);
  [1,2,3,4,5].forEach((d,i)=>{ state.escala[d]=val[i]?val[i].split(':')[1]?.trim()||val[i].trim():state.escala[d]; });
  save();
  renderPeople(getToday());
};
document.getElementById('btn-reset-esc').onclick=function(){
  state.escala={1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'};
  save();
  renderPeople(getToday());
};

load();
renderPeople(getToday());
</script>
</body>
</html>
