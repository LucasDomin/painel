<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  :root {
    --bg:#fff; --bg2:#f5f5f3; --bg3:#efefec;
    --text:#1a1a18; --text2:#6b6b67;
    --border:rgba(0,0,0,.12); --border2:rgba(0,0,0,.22);
    --success-bg:#eaf3de; --success-text:#27500a;
    --info-bg:#e6f1fb; --info-text:#0c447c;
    --radius-md:8px; --radius-lg:12px;
    --font:Arial,sans-serif;
  }
  body { font-family: var(--font); background: var(--bg3); padding:20px; }
  .container { max-width:800px; margin:auto; }
  .header { display:flex; justify-content:space-between; margin-bottom:20px; }
  .day-badge { background:var(--info-bg); color:var(--info-text); padding:6px 12px; border-radius:var(--radius-lg); font-weight:500; }
  .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
  .card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:15px; }
  .card-title { font-weight:500; font-size:13px; margin-bottom:10px; color:var(--text2); display:flex; justify-content:space-between; align-items:center; }
  .tag-wrap { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:12px; padding:4px 8px; border-radius:var(--radius-md); cursor:pointer; user-select:none; }
  .tag-cc { background:var(--info-bg); color:var(--info-text); }
  .tag-emp { background:var(--success-bg); color:var(--success-text); }
  .tag.done { opacity:.5; text-decoration:line-through; }
  .escala-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:15px; margin-bottom:20px; }
  .escala-name { font-size:20px; font-weight:500; }
  .escala-sub { font-size:13px; color:var(--text2); }
  .escala-week { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:10px; }
  .escala-day { font-size:12px; padding:6px; border-radius:var(--radius-md); border:1px solid var(--border); text-align:center; background:var(--bg2); }
  .escala-day.today { background:var(--success-bg); border-color:var(--success-text); color:var(--success-text); }
  .update-area { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:15px; margin-bottom:20px; }
  textarea { width:100%; padding:8px; border:1px solid var(--border2); border-radius:var(--radius-md); font-size:13px; font-family:var(--font); margin-bottom:10px; }
  button { font-size:13px; padding:6px 12px; border-radius:var(--radius-md); border:1px solid var(--border2); background:transparent; cursor:pointer; }
  button.primary { background:var(--info-bg); color:var(--info-text); border-color:var(--info-text); }
  .notice { font-size:12px; color:var(--success-text); background:var(--success-bg); border:1px solid var(--success-text); border-radius:var(--radius-md); padding:6px 10px; display:none; margin-top:6px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span style="font-weight:500;font-size:18px;">Painel de campanhas</span>
    <span class="day-badge" id="day-badge">—</span>
  </div>

  <!-- Tags disponíveis hoje -->
  <div class="grid2">
    <div class="card">
      <div class="card-title">Cartão de crédito — disponíveis hoje <span id="cc-total">0</span></div>
      <div class="tag-wrap" id="cc-tags"></div>
    </div>
    <div class="card">
      <div class="card-title">Empréstimo — disponíveis hoje <span id="emp-total">0</span></div>
      <div class="tag-wrap" id="emp-tags"></div>
    </div>
  </div>

  <!-- Escala -->
  <div class="escala-card">
    <div class="card-title">Escala de empréstimo</div>
    <div><span class="escala-name" id="hoje-pessoa">—</span> <span class="escala-sub">responsável hoje</span></div>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <!-- Atualizar demandas -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div>EMP — lista de países</div>
    <textarea id="inp-emp" placeholder="MX - AR - US"></textarea>
    <div>CC — lista de países</div>
    <textarea id="inp-cc" placeholder="BR - AR - MX"></textarea>
    <button class="primary" id="btn-apply-dem">Aplicar demandas</button>
    <button id="btn-reset-dem">Restaurar padrão</button>
    <div class="notice" id="notice-dem">✓ Demandas salvas e sincronizadas!</div>
  </div>

  <!-- Atualizar escala -->
  <div class="update-area">
    <h3>Atualizar escala</h3>
    <textarea id="inp-escala" placeholder="Segunda: Luiza&#10;Terça: Pedro&#10;Quarta: Leo&#10;Quinta: Ryan&#10;Sexta: Eduardo"></textarea>
    <button class="primary" id="btn-apply-esc">Aplicar escala</button>
    <button id="btn-reset-esc">Restaurar escala</button>
    <div class="notice" id="notice-esc">✓ Escala salva e sincronizada!</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "xxx",
  authDomain: "xxx",
  databaseURL: "https://your-firebase.firebaseio.com",
  projectId: "xxx",
  storageBucket: "xxx",
  messagingSenderId: "xxx",
  appId: "xxx"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== DADOS =====
const AVAIL = {
  BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'],
  US:['seg','ter','qua','qui','sex'], IN:['ter','qua','qui'],
  MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'],
  PH:['seg','qui','sex'], AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'],
  CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'],
  DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'],
  BE:['seg','ter','qua','qui','sex'], TR:['seg','qua','sex'], VN:['seg','qua','sex'],
  GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'],
  JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex']
};

const DEFAULTS = {
  emp: 'MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE',
  cc:  'BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR',
  escala: {1:'Luiza',2:'Pedro',3:'Leo',4:'Ryan',5:'Eduardo'}
};

let state = JSON.parse(JSON.stringify(DEFAULTS));

function parseList(str){ return str.toUpperCase().split(/[\s,-]+/).filter(Boolean); }
function getTodayKey(){ const d=new Date().getDay(); return {key: d>=1&&d<=5?['seg','ter','qua','qui','sex'][d-1]:null,dow:d}; }

function renderAll() {
  const {key,dow} = getTodayKey();
  document.getElementById('day-badge').textContent = dow>=1&&dow<=5 ? ['Segunda','Terça','Quarta','Quinta','Sexta'][dow-1] : 'Fim de semana';

  const ccList = parseList(state.cc).filter(c=>AVAIL[c]?.includes(key));
  const empList = parseList(state.emp).filter(c=>AVAIL[c]?.includes(key));

  document.getElementById('cc-tags').innerHTML = ccList.map(c=>`<span class="tag tag-cc">${c}</span>`).join('');
  document.getElementById('emp-tags').innerHTML = empList.map(c=>`<span class="tag tag-emp">${c}</span>`).join('');

  document.getElementById('cc-total').textContent = ccList.length;
  document.getElementById('emp-total').textContent = empList.length;

  document.getElementById('hoje-pessoa').textContent = state.escala[dow]||'—';

  const ew = document.getElementById('escala-week');
  ew.innerHTML='';
  [1,2,3,4,5].forEach(d=>{
    const div = document.createElement('div');
    div.className='escala-day'+(d===dow?' today':'');
    div.innerHTML=`<div>${['Seg','Ter','Qua','Qui','Sex'][d-1]}</div><div>${state.escala[d]||'—'}</div>`;
    ew.appendChild(div);
  });
}

// ===== FIREBASE SYNC =====
function saveStateFirebase(){
  db.ref('painel/state').set(state);
}

db.ref('painel/state').on('value', snapshot=>{
  const val = snapshot.val();
  if(val){ state = val; renderAll(); }
});

// ===== EVENTOS =====
document.getElementById('btn-apply-dem').onclick = function(){
  const e = document.getElementById('inp-emp').value.trim();
  const c = document.getElementById('inp-cc').value.trim();
  if(e) state.emp = e;
  if(c) state.cc  = c;
  renderAll(); saveStateFirebase();
  document.getElementById('notice-dem').style.display='block';
  setTimeout(()=>document.getElementById('notice-dem').style.display='none',3000);
};

document.getElementById('btn-reset-dem').onclick = function(){
  state.emp=DEFAULTS.emp; state.cc=DEFAULTS.cc;
  document.getElementById('inp-emp').value=''; document.getElementById('inp-cc').value='';
  renderAll(); saveStateFirebase();
};

document.getElementById('btn-apply-esc').onclick = function(){
  const v = document.getElementById('inp-escala').value.trim();
  if(v){
    v.split('\n').forEach((l,i)=>{ const day=i+1; if(l) state.escala[day]=l.trim(); });
    renderAll(); saveStateFirebase();
    document.getElementById('notice-esc').style.display='block';
    setTimeout(()=>document.getElementById('notice-esc').style.display='none',3000);
  }
};

document.getElementById('btn-reset-esc').onclick=function(){
  state.escala=JSON.parse(JSON.stringify(DEFAULTS.escala));
  document.getElementById('inp-escala').value='';
  renderAll(); saveStateFirebase();
};

// INIT
renderAll();
</script>
</body>
</html>
