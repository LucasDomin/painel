<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>

<style>
body { font-family: Arial; background:#efefec; padding:20px; }
.container { max-width:900px; margin:auto; }

.header { display:flex; justify-content:space-between; margin-bottom:15px; }

.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.tag { padding:5px 10px; border-radius:6px; cursor:pointer; margin:3px; display:inline-block; font-size:12px; }
.tag-cc { background:#e6f1fb; }
.tag-emp { background:#eaf3de; }
.done { background:#d4edda !important; }

.escala-day { background:#eee; padding:8px; cursor:pointer; border-radius:6px; text-align:center; }
.today { background:#cfe8c9; }

.person-block { background:#f9f9f9; padding:10px; margin-top:10px; border-radius:6px; }

.modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,.4);
 display:none;
 align-items:center;
 justify-content:center;
}

.modal-box {
 background:#fff;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h3>Painel de campanhas</h3>
<span id="day-badge"></span>
</div>

<div class="grid2">
<div class="card">
<b>Cartão de crédito — disponíveis hoje</b>
<div id="cc-tags"></div>
</div>

<div class="card">
<b>Empréstimo — disponíveis hoje</b>
<div id="emp-tags"></div>
</div>
</div>

<div class="card">
<b>Escala</b>
<div id="hoje-pessoa"></div>
<div id="escala"></
