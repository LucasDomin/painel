<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas — Crédito & Empréstimo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefec;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a0a09c;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: rgba(12,68,124,0.25);
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --success-border: rgba(39,80,10,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;
      --text: #f0efe8; --text2: #9a9a94; --text3: #6a6a64;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --info-bg: #042c53; --info-text: #85b7eb; --info-border: rgba(133,183,235,0.25);
      --success-bg: #173404; --success-text: #97c459; --success-border: rgba(151,196,89,0.25);
    }
  }
  body { background: var(--bg3); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
  .title { font-size: 20px; font-weight: 500; color: var(--text); }
  .day-badge { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-lg); background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 12px; margin-bottom: 1rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; display: flex; align-items: center; gap: 6px; }
  .total-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-md); background: var(--bg2); color: var(--text2); }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: var(--radius-md); cursor: pointer; position: relative; }
  .tag-cc { background: #e6f1fb; color: #0c447c; }
  .tag-emp { background: #eaf3de; color: #27500a; }
  .tag-done { background: #d1f2c0 !important; color: #27500a !important; border: 1px solid #27500a; }
  .tooltip { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: var(--bg); border: 0.5px solid var(--border); padding: 2px 6px; border-radius: var(--radius-md); font-size: 11px; white-space: nowrap; display: none; z-index: 10; }
  .escala-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .escala-name { font-size: 22px; font-weight: 500; color: var(--text); cursor: pointer; }
  .escala-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .escala-week { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: .75rem; }
  .escala-day { font-size: 12px; padding: 6px 8px; border-radius: var(--radius-md); border: 0.5px solid var(--border); text-align: center; background: var(--bg2); }
  .escala-day.today { background: var(--success-bg); border-color: var(--success-border); }
  .d-name { font-weight: 500; font-size: 11px; color: var(--text2); }
  .d-person { font-size: 12px; font-weight: 500; color: var(--text); }
  .escala-day.today .d-name { color: var(--success-text); }
  .escala-day.today .d-person { color: var(--success-text); }
  .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
  .update-area { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; }
  .update-area h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: .75rem; }
  .section-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: .35rem; }
  textarea { width: 100%; font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: var(--bg); color: var(--text); resize: vertical; font-family: var(--font); line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--info-text); }
  .btn-row { display: flex; gap: 8px; margin-top: .5rem; flex-wrap: wrap; }
  button { font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: var(--font); }
  button:hover { background: var(--bg3); }
  button.primary { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
  .mt6 { margin-top: .75rem; }

  /* Equipe bloco */
  .team-block { margin-top: 1rem; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .team-block h4 { font-size: 14px; margin-bottom: .5rem; }
  .team-member { font-size: 13px; font-weight: 500; cursor: pointer; padding: 4px 6px; border-radius: var(--radius-md); margin-bottom: 4px; background: var(--bg); border: 0.5px solid var(--border); }
  .team-member:hover { background: var(--info-bg); color: var(--info-text); }
  .member-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .history-log { font-size: 11px; margin-top: 4px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <span class="title">Painel de campanhas</span>
    <span class="day-badge" id="day-badge">—</span>
  </div>

  <!-- Cards de CC e EMP -->
  <div class="grid2">
    <div class="card">
      <div class="card-title">Cartão de crédito — disponíveis hoje <span class="total-badge" id="cc-total">0</span></div>
      <div class="tag-wrap" id="cc-tags"><span class="empty">Carregando...</span></div>
    </div>
    <div class="card">
      <div class="card-title">Empréstimo — disponíveis hoje <span class="total-badge" id="emp-total">0</span></div>
      <div class="tag-wrap" id="emp-tags"><span class="empty">Carregando...</span></div>
    </div>
  </div>

  <!-- Escala de empréstimo -->
  <div class="escala-card">
    <div class="card-title">Escala de empréstimo</div>
    <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
      <span class="escala-name" id="hoje-pessoa">—</span>
      <span class="escala-sub" id="hoje-label">responsável hoje</span>
    </div>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <div class="divider"></div>

  <!-- Atualizar demandas -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div class="section-label">CC — lista de países</div>
    <textarea id="inp-cc" rows="2" placeholder="BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR"></textarea>
    <div class="section-label mt6">EMP — lista de países</div>
    <textarea id="inp-emp" rows="2" placeholder="MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE"></textarea>
    <div class="btn-row">
      <button class="primary" id="btn-apply-dem">Aplicar demandas</button>
      <button id="btn-reset-dem">Restaurar padrão</button>
    </div>
  </div>

  <!-- Bloco equipe -->
  <div class="team-block" id="team-block">
    <h4>Equipe de Crédito — Hoje</h4>
    <div id="team-cc"></div>
    <h4>Equipe de Empréstimo — Hoje</h4>
    <div id="team-emp"></div>
  </div>
</div>

<script>
/* --- Dados base --- */
const AVAIL = {
  BR:['seg','ter','qua','qui','sex'],
  NL:['seg','qua','sex'],
  US:['seg','ter','qua','qui','sex'],
  IN:['ter','qua','qui'],
  MX:['seg','qua','sex'],
  AU:['seg','ter','qui'],
  TH:['seg','ter','qui'],
  PH:['seg','qui','sex'],
  AR:['seg','qua','qui','sex'],
  CO:['seg','qua','qui','sex'],
  CL:['seg','ter','qua','qui'],
  PE:['seg','ter','qua','qui'],
  DE:['seg','ter','qua','qui','sex'],
  FR:['seg','ter','qua','qui','sex'],
  BE:['seg','ter','qua','qui','sex'],
  TR:['seg','qua','sex'],
  VN:['seg','qua','sex'],
  GR:['seg','ter','qui'],
  ID:['seg','ter','qui'],
  EG:['seg','ter','qui'],
  JP:['seg','ter','qua','qui','sex'],
  AE:['seg','ter','qua','qui','sex']
};

const DOMAINS = {
  BR:['vouquitar','cardfacil'],
  NL:['dekredit'],
  US:['gotallcards'],
  IN:['wheresmycard'],
  MX:['mejoresopciones','unum.mx'],
  AU:['unum.au'],
  TH:['batkredit'],
  PH:['unum.ph'],
  AR:['tarjetasargentinas','solicitecartao'],
  CO:['tarjetaahora'],
  CL:['unum.cl'],
  PE:['unum.pe'],
  DE:['dekreditkarte','unum.de'],
  FR:['unum.fr'],
  BE:['antivora'],
  TR:['kredinow'],
  VN:['ttdtm'],
  GR:['athivor'],
  ID:['unum.id'],
  EG:['unum.eg'],
  JP:['justgreatcards'],
  AE:['moneycredithub']
};

const CREDIT_TEAM = ['LUIZA','LUCAS','LÉO','RYAN','PEDRO'];
const LOAN_TEAM   = ['WALDIR','VICTOR'];

/* --- Estado --- */
let state = {
  emp: 'MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE',
  cc:  'BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR',
  escala: {1:'Luiza',2:'Pedro',3:'Leo',4:'Perereca',5:'Ryan'},
  done: {} // histórico de cliques
};

/* --- Funções --- */
const DAY_MAP   = {0:null,1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:null};
const DAY_NAMES = {1:'Segunda-feira',2:'Terça-feira',3:'Quarta-feira',4:'Quinta-feira',5:'Sexta-feira',0:'Domingo',6:'Sábado'};
const DAY_SHORT = {1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta'};

function parseList(str){ return str.toUpperCase().split(/[\s,\-\/]+/).map(s=>s.trim()).filter(s=>s.length>=2&&s.length<=3); }
function getTodayKey(){ const d = new Date().getDay(); return {key: DAY_MAP[d], dow: d}; }

function renderTags(ids, cls, containerId, totalId) {
  const c = document.getElementById(containerId);
  const t = document.getElementById(totalId);
  t.textContent = ids.length;
  if(!ids.length){ c.innerHTML='<span class="empty">'+(getTodayKey().key?'Nenhum país disponível hoje':'Fim de semana — sem operações')+'</span>'; return; }
  c.innerHTML = ids.map(id=>{
    const tooltip = DOMAINS[id] ? DOMAINS[id].join(' / ') : '';
    return `<span class="tag ${cls}" data-country="${id}" title="${tooltip}">${id}</span>`;
  }).join('');
}

/* Render painel CC, EMP e escala */
function renderAll(){
  const {key,dow} = getTodayKey();
  document.getElementById('day-badge').textContent = DAY_NAMES[dow] || 'Fim de semana';
  
  const empList = parseList(state.emp);
  const ccList  = parseList(state.cc);

  function filterAvail(list){ if(!key) return []; return list.filter(c => AVAIL[c] && AVAIL[c].includes(key)); }

  renderTags(filterAvail(ccList),'tag-cc','cc-tags','cc-total');
  renderTags(filterAvail(empList),'tag-emp','emp-tags','emp-total');

  document.getElementById('hoje-pessoa').textContent = (key && state.escala[dow]) ? state.escala[dow] : '—';
  document.getElementById('hoje-label').textContent  = key ? 'responsável hoje' : '(fim de semana)';

  const ew = document.getElementById('escala-week');
  ew.innerHTML = '';
  [1,2,3,4,5].forEach(d=>{
    const div = document.createElement('div');
    div.className = 'escala-day'+(d===dow?' today':'');
    div.innerHTML = `<div class="d-name">${DAY_SHORT[d]}</div><div class="d-person">${state.escala[d]||'—'}</div>`;
    ew.appendChild(div);
  });

  renderTeam();
}

/* --- Equipe --- */
function renderTeam(){
  const {key} = getTodayKey();
  if(!key) return;

  // responsável do dia
  const resp = state.escala[new Date().getDay()] || '';

  // Crédito
  const ccContainer = document.getElementById('team-cc');
  ccContainer.innerHTML = '';
  CREDIT_TEAM.forEach(name=>{
    const div = document.createElement('div');
    div.className='team-member';
    div.textContent=name;
    div.onclick = ()=> renderMemberTags(name,'cc');
    ccContainer.appendChild(div);
  });

  // Empréstimo
  const empContainer = document.getElementById('team-emp');
  empContainer.innerHTML='';
  const empTeam = LOAN_TEAM.concat(resp); // responsável do dia
  empTeam.forEach(name=>{
    const div = document.createElement('div');
    div.className='team-member';
    div.textContent=name;
    div.onclick = ()=> renderMemberTags(name,'emp');
    empContainer.appendChild(div);
  });
}

/* --- Renderiza países do membro e histórico --- */
function renderMemberTags(member,type){
  const {key} = getTodayKey();
  if(!key) return;

  const ids = parseList(state[type]);
  const avail = ids.filter(c=>AVAIL[c] && AVAIL[c].includes(key));

  // cria container
  let container = document.getElementById('member-tags-container');
  if(!container){
    container = document.createElement('div'); container.id='member-tags-container'; container.className='member-tags'; document.getElementById('team-block').appendChild(container);
  }
  container.innerHTML='';

  avail.forEach(c=>{
    const span = document.createElement('span');
    span.className='tag tag-'+(type==='cc'?'cc':'emp');
    if(state.done[member] && state.done[member].includes(c)) span.classList.add('tag-done');
    span.textContent=c;
    span.title=DOMAINS[c]?DOMAINS[c].join(' / '):'';
    span.onclick = ()=>{
      state.done[member]=state.done[member]||[];
      if(!state.done[member].includes(c)) state.done[member].push(c);
      renderMemberTags(member,type);
      renderAll(); // atualizar cores na tag principal
    };
    container.appendChild(span);
  });

  // histórico
  let hist = document.getElementById('member-history');
  if(!hist){
    hist=document.createElement('div'); hist.id='member-history'; hist.className='history-log'; document.getElementById('team-block').appendChild(hist);
  }
  hist.innerHTML='Histórico: '+(state.done[member]?state.done[member].join(', '):'Nenhum');
}

/* --- Botões aplicar/reset --- */
document.getElementById('btn-apply-dem').onclick=function(){
  const e = document.getElementById('inp-emp').value.trim();
  const c = document.getElementById('inp-cc').value.trim();
  if(e) state.emp=e;
  if(c) state.cc=c;
  renderAll();
};
document.getElementById('btn-reset-dem').onclick=function(){
  state.emp = 'MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE';
  state.cc  = 'BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR';
  document.getElementById('inp-emp').value='';
  document.getElementById('inp-cc').value='';
  renderAll();
};

renderAll();
</script>
</body>
</html>
