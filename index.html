<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas — Crédito & Empréstimo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #0c447c; --info-border: rgba(12,68,124,0.25);
    --success-bg: #eaf3de; --success-text: #27500a; --success-border: rgba(39,80,10,0.25);
    --radius-md: 8px; --radius-lg: 12px; --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  body { background: var(--bg3); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  .header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px; }
  .title { font-size:20px;font-weight:500;color:var(--text); }
  .day-badge { font-size:13px;font-weight:500;padding:6px 14px;border-radius:var(--radius-lg);background:var(--info-bg);color:var(--info-text);border:0.5px solid var(--info-border); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px;margin-bottom:1rem; }
  .card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; }
  .card-title { font-size:12px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.75rem; display:flex; align-items:center; gap:6px; }
  .total-badge { font-size:11px; font-weight:500; padding:2px 8px; border-radius:var(--radius-md); background:var(--bg2); color:var(--text2); }
  .tag-wrap { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:12px; font-weight:500; padding:4px 10px; border-radius:var(--radius-md); cursor:pointer; position:relative; }
  .tag-cc { background:#e6f1fb;color:#0c447c; }
  .tag-emp { background:#eaf3de;color:#27500a; }
  .tag:hover .tooltip { display:block; }
  .tooltip { display:none; position:absolute; top:110%; left:50%; transform:translateX(-50%); background:#333; color:#fff; font-size:11px; padding:4px 6px; border-radius:4px; white-space:nowrap; z-index:10; }
  .empty { font-size:13px;color:var(--text3);font-style:italic; }
  .escala-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; margin-bottom:1rem; }
  .escala-name { font-size:22px; font-weight:500; color:var(--text); cursor:pointer; }
  .escala-sub { font-size:13px; color:var(--text2); margin-top:2px; }
  .escala-week { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:.75rem; }
  .escala-day { font-size:12px; padding:6px 8px; border-radius:var(--radius-md); border:0.5px solid var(--border); text-align:center; background:var(--bg2); cursor:pointer; }
  .escala-day.today { background: var(--success-bg); border-color: var(--success-border); }
  .d-name { font-weight:500;font-size:11px;color:var(--text2); }
  .d-person { font-size:12px;font-weight:500;color:var(--text); }
  .divider { height:0.5px;background:var(--border);margin:1rem 0; }
  .update-area { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; margin-bottom:.75rem; }
  .update-area h3 { font-size:14px;font-weight:500;color:var(--text);margin-bottom:.75rem; }
  .section-label { font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.35rem; }
  textarea { width:100%; font-size:13px; padding:8px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); color:var(--text); resize:vertical; font-family:var(--font); line-height:1.5; }
  textarea:focus { outline:none; border-color:var(--info-text); }
  .btn-row { display:flex; gap:8px; margin-top:.5rem; flex-wrap:wrap; }
  button { font-size:13px; font-weight:500; padding:7px 14px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:transparent; color:var(--text); cursor:pointer; font-family:var(--font); }
  button:hover { background:var(--bg3); }
  button.primary { background:var(--info-bg); color:var(--info-text); border-color:var(--info-border); }
  .mt6 { margin-top:.75rem; }
  .done { background:#d4edda!important; border-color:#28a745!important; }
  .person-block { background:var(--bg2); border-radius:var(--radius-md); padding:8px; margin-top:8px; }
  .person-name { font-weight:600; margin-bottom:4px; cursor:pointer; }
  .person-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .history { font-size:11px; color:#555; margin-top:4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="title">Painel de campanhas</span>
    <span class="day-badge" id="day-badge">—</span>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Cartão de crédito — disponíveis hoje <span class="total-badge" id="cc-total">0</span></div>
      <div class="tag-wrap" id="cc-tags"><span class="empty">Carregando...</span></div>
    </div>
    <div class="card">
      <div class="card-title">Empréstimo — disponíveis hoje <span class="total-badge" id="emp-total">0</span></div>
      <div class="tag-wrap" id="emp-tags"><span class="empty">Carregando...</span></div>
    </div>
  </div>

  <div class="escala-card">
    <div class="card-title">Escala de empréstimo</div>
    <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
      <span class="escala-name" id="hoje-pessoa">—</span>
      <span class="escala-sub" id="hoje-label">responsável hoje</span>
    </div>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <div class="divider"></div>

  <!-- Atualizar demandas -->
  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div class="section-label">CC — lista de países</div>
    <textarea id="inp-cc" rows="2" placeholder="BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR"></textarea>
    <div class="section-label mt6">EMP — lista de países</div>
    <textarea id="inp-emp" rows="2" placeholder="MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE"></textarea>
    <div class="btn-row">
      <button class="primary" id="btn-apply-dem">Aplicar demandas</button>
      <button id="btn-reset-dem">Restaurar padrão</button>
    </div>
  </div>

  <!-- Atualizar escala semana -->
  <div class="update-area">
    <h3>Atualizar escala de empréstimo</h3>
    <div class="section-label">Segunda a sexta: Nome do responsável</div>
    <textarea id="inp-escala" rows="5" placeholder="Segunda: Luiza&#10;Terça: Lucas&#10;Quarta: Léo&#10;Quinta: Ryan&#10;Sexta: Pedro"></textarea>
    <div class="btn-row">
      <button class="primary" id="btn-apply-esc">Aplicar escala</button>
      <button id="btn-reset-esc">Restaurar escala</button>
    </div>
  </div>

  <!-- Bloco de pessoas com demandas -->
  <div id="people-block"></div>

</div>

<script>
const AVAIL = { BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'], US:['seg','ter','qua','qui','sex'], IN:['ter','qua','qui'], MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'], PH:['seg','qui','sex'], AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'], CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'], DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'], BE:['seg','ter','qua','qui','sex'], TR:['seg','qua','sex'], VN:['seg','qua','sex'], GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'], JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex'] };
const DOMAINS = { BR:['vouquitar','cardfacil'], NL:['dekredit'], US:['gotallcards'], IN:['wheresmycard'], MX:['mejoresopciones','unum.mx'], AU:['unum.au'], TH:['batkredit'], PH:['unum.ph'], AR:['tarjetasargentinas','solicitecartao'], CO:['tarjetaahora'], CL:['unum.cl'], PE:['unum.pe'], DE:['dekreditkarte','unum.de'], FR:['unum.fr'], BE:['antivora'], TR:['kredinow'], VN:['ttdtm'], GR:['athivor'], ID:['unum.id'], EG:['unum.eg'], JP:['justgreatcards'], AE:['moneycredithub'] };

const DAY_MAP={0:null,1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:null};
const DAY_NAMES={1:'Segunda-feira',2:'Terça-feira',3:'Quarta-feira',4:'Quinta-feira',5:'Sexta-feira',0:'Domingo',6:'Sábado'};
const DAY_SHORT={1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta'};

let state={
  emp:'MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE',
  cc:'BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR',
  escala:{1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'},
  done:{cc:{},emp:{}},
  history:[]
};

function parseList(str){ return str.toUpperCase().split(/[\s,\-\/]+/).map(s=>s.trim()).filter(s=>s.length>=2&&s.length<=3); }
function getTodayKey(){ const d=new Date().getDay(); return {key:DAY_MAP[d],dow:d}; }

function renderTags(ids,cls,containerId,totalId){ 
  const c=document.getElementById(containerId); 
  const t=document.getElementById(totalId); 
  t.textContent=ids.length; 
  if(!ids.length){ 
    c.innerHTML='<span class="empty">'+(getTodayKey().key?'Nenhum país disponível hoje':'Fim de semana — sem operações')+'</span>'; 
    return; 
  } 
  c.innerHTML = ids.map(id=>{
    const domains=DOMAINS[id]?DOMAINS[id].join('/') : ''; 
    return `<span class="tag ${cls}" data-country="${id}" onclick="toggleDone(this,'${cls}')">${id}<span class="tooltip">${domains}</span></span>`; 
  }).join(''); 
}

function toggleDone(el,cls){ 
  const country=el.dataset.country; 
  const todayKey=getTodayKey().key; 
  if(!todayKey) return; 
  state.done[cls][country]=!state.done[cls][country]; 
  el.classList.toggle('done',state.done[cls][country]); 
  state.history.push({country,cls,done:state.done[cls][country],date:new Date().toLocaleString()});
}

// Escala
function renderEscala(dow=null){ 
  const dayKey=dow||getTodayKey().dow; 
  document.getElementById('escala-week').innerHTML=''; 
  [1,2,3,4,5].forEach(d=>{ 
    const div=document.createElement('div'); 
    div.className='escala-day'+(d===dayKey?' today':''); 
    div.innerHTML=`<div class="d-name">${DAY_SHORT[d]}</div><div class="d-person" onclick="renderForPerson(${d})">${state.escala[d]||'—'}</div>`; 
    document.getElementById('escala-week').appendChild(div); 
  }); 
}

// Render pessoa
function renderForPerson(dow){ 
  const key=DAY_MAP[dow]; 
  const ccList=parseList(state.cc).filter(c=>AVAIL[c]&&AVAIL[c].includes(key)); 
  const empList=parseList(state.emp).filter(c=>AVAIL[c]&&AVAIL[c].includes(key)); 
  renderTags(ccList,'tag-cc','cc-tags','cc-total'); 
  renderTags(empList,'tag-emp','emp-tags','emp-total'); 
  document.getElementById('hoje-pessoa').textContent=state.escala[dow]; 
  document.getElementById('hoje-label').textContent='responsável no dia'; 
  renderPeopleBlock(dow); 
}

function renderPeopleBlock(dow){ 
  const block=document.getElementById('people-block'); 
  block.innerHTML=''; 
  const creditNames=['LUIZA','LUCAS','LÉO','RYAN','PEDRO','EDUARDO']; 
  const loanNames=['WALDIR','VICTOR','EDUARDO']; 
  const respEscala=state.escala[dow]; 
  const loanFiltered=loanNames.filter(n=>n!==respEscala); 

  function createPersonDiv(name,list,cls){ 
    const div=document.createElement('div'); 
    div.className='person-block'; 
    const title=document.createElement('div'); 
    title.className='person-name'; 
    title.textContent=name; 
    const tags=document.createElement('div'); 
    tags.className='person-tags'; 
    list.forEach(c=>{ 
      const tag=document.createElement('span'); 
      tag.className=`tag ${cls}`; 
      tag.textContent=c; 
      tag.onclick=()=>{ 
        tag.classList.toggle('done'); 
        state.done[cls][c]=tag.classList.contains('done'); 
        state.history.push({country:c,cls,done:state.done[cls][c],person:name,date:new Date().toLocaleString()});
        renderHistory(name,cls);
      }; 
      const domains=DOMAINS[c]?DOMAINS[c].join('/') : ''; 
      const tt=document.createElement('span'); 
      tt.className='tooltip'; 
      tt.textContent=domains; 
      tag.appendChild(tt); 
      tags.appendChild(tag); 
    }); 
    div.appendChild(title); 
    div.appendChild(tags); 

    const hist=document.createElement('div'); 
    hist.className='history'; 
    hist.id=`history-${name}-${cls}`; 
    div.appendChild(hist); 

    return div; 
  }

  const todayKey=DAY_MAP[dow]; 
  const ccList=parseList(state.cc).filter(c=>AVAIL[c]&&AVAIL[c].includes(todayKey)); 
  const empList=parseList(state.emp).filter(c=>AVAIL[c]&&AVAIL[c].includes(todayKey)); 
  creditNames.forEach(n=>block.appendChild(createPersonDiv(n,ccList,'tag-cc'))); 
  loanFiltered.forEach(n=>block.appendChild(createPersonDiv(n,empList,'tag-emp'))); 
}

// render histórico
function renderHistory(name,cls){
  const histDiv=document.getElementById(`history-${name}-${cls}`);
  if(!histDiv) return;
  const logs=state.history.filter(h=>h.person===name && h.cls===cls).map(h=>`${h.country} - ${h.done?'Feito':'Não feito'} (${h.date})`);
  histDiv.innerHTML=logs.join('<br>');
}

function renderAll(){ 
  const {key,dow}=getTodayKey(); 
  document.getElementById('day-badge').textContent=DAY_NAMES[dow]||'Fim de semana'; 
  const empList=parseList(state.emp); 
  const ccList=parseList(state.cc); 
  renderTags(ccList,'tag-cc','cc-tags','cc-total'); 
  renderTags(empList,'tag-emp','emp-tags','emp-total'); 
  document.getElementById('hoje-pessoa').textContent=(key && state.escala[dow])?state.escala[dow]:'—'; 
  document.getElementById('hoje-label').textContent=key?'responsável hoje':'(fim de semana)'; 
  renderEscala(); 
  renderPeopleBlock(dow); 
}

// botões
document.getElementById('btn-apply-dem').onclick=function(){ 
  const e=document.getElementById('inp-emp').value.trim(); 
  const c=document.getElementById('inp-cc').value.trim(); 
  if(e) state.emp=e; 
  if(c) state.cc=c; 
  renderAll(); 
};
document.getElementById('btn-reset-dem').onclick=function(){ 
  state.emp='MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE'; 
  state.cc='BR - AR - MX - US - DE - JP - TR - AU - PH - BE - TH - CO - NL - PE - FR'; 
  renderAll(); 
};
document.getElementById('btn-apply-esc').onclick=function(){ 
  const val=document.getElementById('inp-escala').value.trim().split(/\n/); 
  [1,2,3,4,5].forEach((d,i)=>{ state.escala[d]=val[i]?val[i].split(':')[1]?.trim()||val[i].trim():state.escala[d]; }); 
  renderAll(); 
};
document.getElementById('btn-reset-esc').onclick=function(){ 
  state.escala={1:'Luiza',2:'Lucas',3:'Léo',4:'Ryan',5:'Pedro'}; 
  renderAll(); 
};

renderAll();
</script>
</body>
</html>
