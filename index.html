<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Campanhas</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#fff;--bg2:#f5f5f3;--bg3:#efefec;--text:#1a1a18;--text2:#6b6b67;--border:rgba(0,0,0,.12);--info-bg:#e6f1fb;--info-text:#0c447c;--success-bg:#eaf3de;--success-text:#27500a;--radius-md:6px;--radius-lg:10px;--font:Arial, Helvetica, sans-serif;}
  body{font-family:var(--font);background:var(--bg3);padding:20px;}
  .container{max-width:900px;margin:auto;}
  .header{display:flex;justify-content:space-between;margin-bottom:20px;}
  .card{background:var(--bg);padding:15px;border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:10px;}
  .card-title{font-weight:bold;margin-bottom:8px;}
  .tag{padding:4px 8px;border-radius:6px;margin:2px;display:inline-block;cursor:pointer;font-size:12px;}
  .tag-cc{background:var(--info-bg);}
  .tag-emp{background:var(--success-bg);}
  .tag.selected{outline:2px solid #333;}
  .escala-week{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:10px;}
  .escala-day{background:#eee;padding:8px;text-align:center;border-radius:6px;cursor:pointer;}
  .escala-day.today{background:var(--success-bg);transform:scale(1.05);}
  .person-block{background:#f9f9f9;padding:8px;margin-top:8px;border-radius:6px;}
  .history{font-size:11px;margin-top:5px;color:#666;}
  .update-area{background:var(--bg2);padding:10px;margin-bottom:10px;border-radius:var(--radius-md);}
  .tooltip{position:absolute;background:#fff;border:1px solid #ccc;padding:6px 8px;border-radius:6px;font-size:12px;display:none;z-index:10;white-space:nowrap;}
  textarea{width:100%;padding:6px;border-radius:6px;margin-top:5px;margin-bottom:5px;font-family:var(--font);}
  button{padding:6px 12px;margin-right:5px;border-radius:6px;cursor:pointer;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h3>Painel de campanhas</h3>
    <span id="day-badge">—</span>
  </div>

  <div class="card">
    <div class="card-title">Cartão de crédito — disponíveis hoje <span id="cc-total"></span></div>
    <div id="cc-tags"></div>
  </div>

  <div class="card">
    <div class="card-title">Empréstimo — disponíveis hoje <span id="emp-total"></span></div>
    <div id="emp-tags"></div>
  </div>

  <div class="card">
    <div class="card-title">Escala de empréstimo</div>
    <span id="hoje-pessoa">—</span>
    <div class="escala-week" id="escala-week"></div>
  </div>

  <div class="update-area">
    <h3>Atualizar demandas</h3>
    <div>CC — lista de países</div>
    <textarea id="inp-cc" rows="2"></textarea>
    <div>EMP — lista de países</div>
    <textarea id="inp-emp" rows="2"></textarea>
    <button id="btn-apply-dem">Aplicar demandas</button>
  </div>

  <div class="update-area">
    <h3>Atualizar escala</h3>
    <textarea id="inp-escala" rows="5" placeholder="Segunda: Luiza&#10;Terça: Lucas&#10;Quarta: Léo&#10;Quinta: Ryan&#10;Sexta: Pedro"></textarea>
    <button id="btn-apply-esc">Aplicar escala</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
firebase.initializeApp({
  apiKey: "SUA_API_KEY",
  databaseURL: "SUA_DATABASE_URL"
});
const db=firebase.database();

const DAY_MAP={0:null,1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:null};
const DAY_NAMES={1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta'};
const AVAIL={
  BR:['seg','ter','qua','qui','sex'], NL:['seg','qua','sex'], US:['seg','ter','qua','qui','sex'],
  IN:['ter','qua','qui'], MX:['seg','qua','sex'], AU:['seg','ter','qui'], TH:['seg','ter','qui'],
  PH:['seg','qui','sex'], AR:['seg','qua','qui','sex'], CO:['seg','qua','qui','sex'],
  CL:['seg','ter','qua','qui'], PE:['seg','ter','qua','qui'],
  DE:['seg','ter','qua','qui','sex'], FR:['seg','ter','qua','qui','sex'],
  BE:['seg','ter','qua','qui','sex'], TR:['seg','qua','sex'], VN:['seg','qua','sex'],
  GR:['seg','ter','qui'], ID:['seg','ter','qui'], EG:['seg','ter','qui'],
  JP:['seg','ter','qua','qui','sex'], AE:['seg','ter','qua','qui','sex']
};
const DOMAIN_MAP={
  BR:['vouquitar','cardfacil'], NL:['dekredit'], US:['gotallcards'], IN:['wheresmycard'],
  MX:['mejoresopciones','unum.mx'], AU:['unum.au'], TH:['batkredit'], PH:['unum.ph'],
  AR:['tarjetasargentinas','solicitecartao'], CO:['tarjetaahora'], CL:['unum.cl'], PE:['unum.pe'],
  DE:['dekreditkarte','unum.de'], FR:['unum.fr'], BE:['antivora'], TR:['kredinow'], VN:['ttdtm'],
  GR:['athivor'], ID:['unum.id'], EG:['unum.eg'], JP:['justgreatcards'], AE:['moneycredithub']
};
const PEOPLE_CC=['LUIZA','LUCAS','LÉO','RYAN','PEDRO'];
const PEOPLE_EMP_FIXED=['WALDIR','VICTOR'];
let state={
  cc:'BR - AR - US - DE - JP - AU - PH - BE - TH - CO - NL - PE - FR',
  emp:'MX - AR - US - AU - VN - PH - CL - GR - CO - AE - PE - BE',
  escala:{1:'LUIZA',2:'LUCAS',3:'LÉO',4:'RYAN',5:'PEDRO'}
};

function parseList(str){return str.toUpperCase().split(/[\s,-]+/).filter(Boolean);}
function getToday(){const d=new Date().getDay();return(d>=1&&d<=5)?d:1;}

function render(){
  const dow=getToday();const key=DAY_MAP[dow];document.getElementById('day-badge').textContent=DAY_NAMES[dow];
  const ccList=parseList(state.cc).filter(c=>AVAIL[c]?.includes(key));
  const empList=parseList(state.emp).filter(c=>AVAIL[c]?.includes(key));
  const resp=state.escala[dow];
  const empToday=[...PEOPLE_EMP_FIXED];if(resp&&!PEOPLE_EMP_FIXED.includes(resp))empToday.push(resp);

  // CC
  const ccDiv=document.getElementById('cc-tags');ccDiv.innerHTML='';
  ccList.forEach(c=>{const tag=document.createElement('span');tag.className='tag tag-cc';tag.textContent=c;tag.onmouseover=()=>showTooltip(c);tag.onmouseout=hideTooltip;ccDiv.appendChild(tag);});
  document.getElementById('cc-total').textContent=ccList.length;

  // EMP
  const empDiv=document.getElementById('emp-tags');empDiv.innerHTML='';
  empToday.forEach(c=>{const tag=document.createElement('span');tag.className='tag tag-emp';tag.textContent=c;tag.onmouseover=()=>showTooltip(c);tag.onmouseout=hideTooltip;empDiv.appendChild(tag);});
  document.getElementById('emp-total').textContent=empToday.length;

  // Escala
  document.getElementById('hoje-pessoa').textContent=resp;
  const ew=document.getElementById('escala-week');ew.innerHTML='';
  [1,2,3,4,5].forEach(d=>{const div=document.createElement('div');div.className='escala-day'+(d===dow?' today':'');div.innerHTML=`${DAY_NAMES[d]}<br>${state.escala[d]||'—'}`;div.onclick=()=>{document.getElementById('hoje-pessoa').textContent=state.escala[d];};ew.appendChild(div);});
}

const tooltip=document.getElementById('tooltip');
function showTooltip(c){const doms=DOMAIN_MAP[c]||[];if(!doms.length)return;tooltip.innerHTML=doms.join('<br>');tooltip.style.display='block';document.onmousemove=e=>{tooltip.style.left=(e.pageX+10)+'px';tooltip.style.top=(e.pageY+10)+'px';};}
function hideTooltip(){tooltip.style.display='none';document.onmousemove=null;}

// Sincronização Firebase
function saveState(){
  db.ref('painel/demandas').set({cc:state.cc,emp:state.emp});
  db.ref('painel/escala').set(state.escala);
}

function loadState(){
  db.ref('painel/demandas').on('value',snap=>{if(snap.val()){state.cc=snap.val().cc;state.emp=snap.val().emp;render();}});
  db.ref('painel/escala').on('value',snap=>{if(snap.val()){state.escala=snap.val();render();}});
}

// APLICAR DEMANDAS
document.getElementById('btn-apply-dem').onclick=()=>{
  const c=document.getElementById('inp-cc').value.trim();
  const e=document.getElementById('inp-emp').value.trim();
  if(c)state.cc=c;if(e)state.emp=e;saveState();render();
};

// APLICAR ESCALA
document.getElementById('btn-apply-esc').onclick=()=>{
  const v=document.getElementById('inp-escala').value.trim();
  v.split('\n').forEach(l=>{const m=l.match(/^(\w+)\s*[:\-]\s*(.+)$/i);if(m){const dmap={'segunda':1,'terca':2,'terça':2,'quarta':3,'quinta':4,'sexta':5};const dk=dmap[m[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')];if(dk)state.escala[dk]=m[2].trim();}});saveState();render();
};

// INIT
loadState();
render();
</script>
</body>
</html>
